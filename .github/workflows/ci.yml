name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-smoke-test:
    runs-on: ubuntu-latest
    env:
      DB_PATH: ${{ runner.temp }}/quiz.sqlite3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall app scripts

      - name: Validate question bank JSON
        run: python scripts/validate_questions.py

      - name: Initialize temporary database
        run: python scripts/init_db.py

      - name: Seed questions into temporary database
        run: python scripts/seed_questions.py
