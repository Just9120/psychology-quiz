<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Мини-викторина</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 14px;
        background: #f6f8fc;
        color: #1f2533;
      }

      h3 {
        margin: 4px 0 6px;
      }

      .setup-intro {
        color: #4d5870;
        font-size: 0.96em;
        line-height: 1.35;
        margin: 0 0 14px;
      }

      fieldset {
        margin: 12px 0;
        padding: 12px;
        border: 1px solid #e1e6f0;
        border-radius: 16px;
        background: #fff;
      }

      legend {
        padding: 0 6px;
        color: #2d3650;
        font-weight: 700;
      }

      button {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
      }

      ol {
        padding-left: 22px;
        margin: 10px 0 0;
      }
      ol li {
        margin: 8px 0;
      }
      ol button {
        border-radius: 14px;
        border: 1px solid #d6dce8;
        text-align: left;
        white-space: normal;
        line-height: 1.35;
      }
      ol button:disabled {
        color: #222;
        -webkit-text-fill-color: #222;
      }

      label {
        display: block;
        margin: 8px 0;
        padding: 10px;
        border: 1px solid #edf0f6;
        border-radius: 12px;
        background: #fbfcff;
        line-height: 1.3;
      }
      label input {
        margin-right: 8px;
      }

      .setup-form {
        margin-top: 8px;
      }
      .setup-section {
        box-shadow: 0 1px 2px rgba(30, 42, 72, 0.04);
      }

      [hidden] {
        display: none;
      }

      .err {
        color: #b00020;
      }

      .meta {
        color: #555;
        font-size: 0.95em;
        margin: -6px 0 10px 0;
      }

      .note {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin: 10px 0;
      }

      .warn {
        padding: 10px;
        border: 1px solid #b00020;
        border-radius: 8px;
        background: #fff5f5;
        color: #7a0012;
        margin: 10px 0;
      }
      .feedback-correct { color: #0a7d24; font-weight: 700; }
      .feedback-wrong { color: #b00020; font-weight: 700; }
      ol button.answer-selected {
        border: 2px solid #5f6778;
        background: #f3f5fa;
        color: #1f2533;
        -webkit-text-fill-color: #1f2533;
      }
      ol button.answer-pending {
        border: 2px solid #3653a5;
        background: #eef3ff;
        color: #1e2f6b;
        -webkit-text-fill-color: #1e2f6b;
      }
      ol button.answer-correct {
        border: 2px solid #0a7d24;
        background: #edf9f1;
        color: #124d22;
        -webkit-text-fill-color: #124d22;
      }
      ol button.answer-selected-wrong {
        border: 2px solid #b00020;
        background: #fff1f3;
        color: #711226;
        -webkit-text-fill-color: #711226;
      }
      .answer-disabled {
        background: #f6f7fb;
        border-color: #cfd5e3;
        color: #222;
        -webkit-text-fill-color: #222;
      }
      .answer-status {
        min-height: 24px;
        margin: 8px 0 10px;
        color: #445;
        font-size: 0.95em;
      }
      .answer-status.pending::before {
        content: '⏳ ';
      }
      .answer-feedback {
        border: 1px solid #d6dce8;
        border-radius: 12px;
        padding: 12px;
        margin: 12px 0;
        background: #fafcff;
      }
      .answer-feedback p {
        margin: 0 0 8px;
        line-height: 1.4;
        white-space: pre-line;
      }
      .answer-feedback p:last-child {
        margin-bottom: 0;
      }
      .feedback-line {
        font-weight: 700;
      }
      .question-card,
      .result-card {
        border: 1px solid #e1e6f0;
        border-radius: 16px;
        padding: 14px;
        background: #fff;
        box-shadow: 0 1px 2px rgba(30, 42, 72, 0.04);
      }
      .question-title,
      .result-title {
        margin: 0 0 8px;
      }
      .question-progress {
        display: inline-block;
        font-size: 0.86em;
        color: #4a5876;
        background: #f3f6fc;
        border: 1px solid #d9e1f1;
        border-radius: 999px;
        padding: 3px 10px;
        margin: 0 0 12px;
      }
      .question-text {
        margin: 0 0 12px;
        line-height: 1.45;
      }
      .completion-actions {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }
      .answer-next {
        margin-top: 10px;
        border: 0;
        border-radius: 10px;
        background: #3653a5;
        color: #fff;
        font-weight: 700;
      }
      .telemetry-debug {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.82em;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <h3>Мини-викторина</h3>
    <p id="setup_intro" class="setup-intro">Выберите формат, темы и сложность — всё пройдёт внутри Telegram.</p>
    <div id="frontend_marker" class="meta" hidden></div>
    <div id="runner_state" class="note"></div>
    <div id="api_diag" class="note" hidden></div>
    <div id="telemetry_debug" class="note telemetry-debug" hidden></div>
    <div id="err" class="err"></div>
    <div id="question_view" hidden></div>
    <div id="mode_view" class="question-card" hidden>
      <h4 class="question-title">Выберите режим</h4>
      <div class="completion-actions">
        <button type="button" id="mode_topics">Тесты по темам</button>
        <button type="button" id="mode_glossary">Глоссарий</button>
      </div>
    </div>
    <div id="glossary_view" hidden></div>
    <div id="setup_warning" class="warn" hidden></div>

    <form id="f" class="setup-form" hidden>
      <fieldset class="setup-section">
        <legend>Режим</legend>
        <label><input type="radio" name="quiz_mode" value="single" checked /> Конкретная тема</label>
        <label><input type="radio" name="quiz_mode" value="selected_mix" /> Микс из выбранных тем</label>
        <label><input type="radio" name="quiz_mode" value="all" /> Все темы</label>
      </fieldset>

      <fieldset id="cats_fieldset" class="setup-section">
        <legend>Темы</legend>
        <div id="cats"></div>
      </fieldset>

      <fieldset class="setup-section">
        <legend>Количество</legend>
        <label><input type="radio" name="question_count" value="5" checked /> 5</label>
        <label><input type="radio" name="question_count" value="10" /> 10</label>
        <label><input type="radio" name="question_count" value="15" /> 15</label>
        <label><input type="radio" name="question_count" value="all" /> Все доступные</label>
      </fieldset>

      <fieldset class="setup-section">
        <legend>Сложность</legend>
        <label><input type="radio" name="difficulty" value="any" checked /> Любая</label>
        <label><input type="radio" name="difficulty" value="easy" /> Лёгкие</label>
        <label><input type="radio" name="difficulty" value="medium" /> Средние</label>
        <label><input type="radio" name="difficulty" value="hard" /> Сложные</label>
      </fieldset>

      <p id="setup_hint" class="meta"></p>
      <button type="submit" id="go" disabled>Начать викторину</button>
    </form>

    <script>
      const FRONTEND_VERSION = 'ui-polish-v6-visual-cleanup';
      const ANSWER_API_TIMEOUT_MS = 8000;
      const ANSWER_HEDGE_DELAY_MS = 1000;

      const err = document.getElementById('err');
      const form = document.getElementById('f');
      const setupIntro = document.getElementById('setup_intro');
      const cats = document.getElementById('cats');
      const go = document.getElementById('go');
      const setupHint = document.getElementById('setup_hint');
      const questionView = document.getElementById('question_view');
      const modeView = document.getElementById('mode_view');
      const glossaryView = document.getElementById('glossary_view');
      const modeTopics = document.getElementById('mode_topics');
      const modeGlossary = document.getElementById('mode_glossary');
      const catsFieldset = document.getElementById('cats_fieldset');
      const setupWarning = document.getElementById('setup_warning');
      const runnerState = document.getElementById('runner_state');
      const apiDiag = document.getElementById('api_diag');
      const telemetryDebug = document.getElementById('telemetry_debug');
      const frontendMarker = document.getElementById('frontend_marker');
      const tg = window.Telegram?.WebApp;

      if (tg) {
        tg.ready();
        tg.expand();
      } else {
        runnerState.textContent =
          'Не удалось открыть викторину в окне. Попробуйте открыть её из Telegram ещё раз или пройдите викторину в чате через /quiz.';
      }

      function parseContext(raw) {
        if (!raw) return null;
        try {
          const b64 = raw.replace(/-/g, '+').replace(/_/g, '/');
          const padding = '='.repeat((4 - (b64.length % 4)) % 4);
          const bin = atob(b64 + padding);
          const bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i += 1) {
            bytes[i] = bin.charCodeAt(i);
          }
          const json = new TextDecoder('utf-8').decode(bytes);
          return JSON.parse(json);
        } catch {
          try {
            return JSON.parse(decodeURIComponent(raw));
          } catch {
            return null;
          }
        }
      }

      function getQueryParam(name) {
        const searchParams = new URLSearchParams(location.search.slice(1));
        return searchParams.get(name);
      }

      function getContextParam() {
        const searchContext = getQueryParam('context');
        if (searchContext) return searchContext;
        const hashParams = new URLSearchParams(location.hash.replace(/^#/, ''));
        return hashParams.get('context');
      }

      const ctx = parseContext(getContextParam()) || {};
      const rs = ctx?.runner_state || {};
      const hasCompactRunnerQuestion = ctx?.runner_q?.m === 'runner' && ctx?.runner_q?.sd === true;
      const runnerMode = rs?.state === 'in_progress' || hasCompactRunnerQuestion;
      const completedMode = rs?.state === 'completed';
      const setupMode = !runnerMode && !completedMode;
      const hydrateOnSetup = ctx?.hydrate_on_setup === true;

      function isDebugMode() {
        if (getQueryParam('debug') === '1') return true;
        return ctx?.debug === true;
      }

      const debugMode = isDebugMode();
      frontendMarker.textContent = `Mini App frontend: ${FRONTEND_VERSION}`;
      frontendMarker.hidden = !debugMode;

      const apiDiagState = {
        configured: false,
        initDataPresent: false,
        attemptStatus: 'not_attempted',
        setupStatus: 'not_attempted',
        setupErrorCode: '',
        apiOrigin: '',
        answerRequestId: '',
        answerPhase: 'idle',
        answerElapsedMs: 0,
        answerRetryCount: 0,
        answerAttempt: 0,
        answerFinalPhase: 'idle',
        setupRetryCount: 0,
        setupAttempt: 0,
        setupRequestId: '',
        setupFinalPhase: 'idle',
        answerEndpointPath: '/miniapp/answer',
        setupEndpointPath: '/miniapp/setup',
        answerTransport: '',
        setupTransport: '',
        answerMethod: 'POST',
        setupMethod: 'POST',
        answerStatus: '',
        setupStatusCode: '',
        answerErrorCode: '',
        answerHedged: false,
        answerWinnerAttempt: 0,
        answerHedgeDelayMs: 0,
        answerHedgeStartedMs: '-',
        setupElapsedMs: 0,
        answerPhases: [],
        setupPhases: [],
      };
      const telemetryRows = [];
      const setupOptionsCache = {
        categories: Array.isArray(ctx?.categories) ? ctx.categories : [],
      };
      const glossarySetupCache = {
        topics: getGlossaryTopicsFromSetupPayload(ctx),
      };
      let setupRenderCategories = null;
      let currentCategoryInputType = '';
      let answerSubmitInFlight = false;
      let answerSubmitGeneration = 0;
      let setupSubmitInFlight = false;

      function clearRunnerView() {
        questionView.replaceChildren();
        questionView.hidden = true;
        glossaryView.replaceChildren();
        glossaryView.hidden = true;
      }

      function showModeSelection() {
        clearRunnerView();
        form.hidden = true;
        setupIntro.hidden = false;
        modeView.hidden = false;
        runnerState.textContent = 'Выберите режим: тесты по темам или глоссарий.';
      }

      function showSetupMode({ message = 'Выберите формат, темы и сложность.', clearError = true } = {}) {
        clearRunnerView();
        modeView.hidden = true;
        form.hidden = false;
        setupIntro.hidden = false;
        setupWarning.hidden = true;
        if (clearError) err.textContent = '';
        if (typeof setupRenderCategories === 'function') {
          setupRenderCategories();
        }
        validate();
        runnerState.textContent = message;
      }

      function showRunnerMode() {
        modeView.hidden = true;
        modeView.hidden = true;
        form.hidden = true;
        setupIntro.hidden = true;
        setupWarning.hidden = true;
        questionView.hidden = false;
      }

      function showCompletedMode() {
        modeView.hidden = true;
        modeView.hidden = true;
        form.hidden = true;
        setupIntro.hidden = true;
        setupWarning.hidden = true;
        questionView.hidden = false;
      }

      function detectContextMode() {
        if (!ctx || ctx.type !== 'miniapp_setup_context' || ctx.version !== 1) return 'invalid';
        if (completedMode) return 'completed';
        if (runnerMode) return 'runner';
        return 'setup';
      }

      function renderApiDiagnostics() {
        renderTelemetryDebug();
        if (!debugMode) {
          apiDiag.hidden = true;
          return;
        }
        const mode = detectContextMode();
        const origin = apiDiagState.apiOrigin ? ` · origin: ${apiDiagState.apiOrigin}` : '';
        apiDiag.hidden = false;
        const answerPhases = apiDiagState.answerPhases.map((entry) => `${entry.phase}:${entry.elapsed_ms}`).join(',') || '-';
        const setupPhases = apiDiagState.setupPhases.map((entry) => `${entry.phase}:${entry.elapsed_ms}`).join(',') || '-';
        apiDiag.textContent =
          `API diag — frontend: ${FRONTEND_VERSION} · mode: ${mode} · configured: ` +
          `${apiDiagState.configured ? 'yes' : 'no'} · initData: ${apiDiagState.initDataPresent ? 'yes' : 'no'} ` +
          `· answer: ${apiDiagState.attemptStatus} · setup: ${apiDiagState.setupStatus}` +
          ` · req_id: ${apiDiagState.answerRequestId || '-'} · phase: ${apiDiagState.answerPhase}` +
          ` · answer_transport: ${apiDiagState.answerTransport || '-'} · answer_method: ${apiDiagState.answerMethod}` +
          ` · answer_status: ${apiDiagState.answerStatus || '-'} · answer_error: ${apiDiagState.answerErrorCode || '-'}` +
          ` · elapsed_ms: ${apiDiagState.answerElapsedMs} · retry: ${apiDiagState.answerRetryCount}` +
          ` · attempt: ${apiDiagState.answerAttempt} · final: ${apiDiagState.answerFinalPhase}` +
          ` · hedged: ${apiDiagState.answerHedged ? 'true' : 'false'} · winner_attempt: ${apiDiagState.answerWinnerAttempt || '-'}` +
          ` · hedge_delay_ms: ${apiDiagState.answerHedgeDelayMs || '-'} · hedge_started_ms: ${apiDiagState.answerHedgeStartedMs || '-'}` +
          ` · setup_req_id: ${apiDiagState.setupRequestId || '-'} · setup_transport: ${apiDiagState.setupTransport || '-'} · setup_method: ${apiDiagState.setupMethod}` +
          ` · setup_status: ${apiDiagState.setupStatusCode || '-'} · setup_elapsed_ms: ${apiDiagState.setupElapsedMs}` +
          ` · setup_retry: ${apiDiagState.setupRetryCount}` +
          ` · setup_attempt: ${apiDiagState.setupAttempt} · setup_final: ${apiDiagState.setupFinalPhase}` +
          ` · endpoint: ${apiDiagState.answerEndpointPath} · setup_endpoint: ${apiDiagState.setupEndpointPath}` +
          ` · answer_phases: ${answerPhases} · setup_phases: ${setupPhases}` +
          `${apiDiagState.setupErrorCode ? ` · setup_code: ${apiDiagState.setupErrorCode}` : ''}${origin}`;
      }
      function pushDiagPhase(track, phase, startedAt, extras = {}) {
        const key = track === 'setup' ? 'setupPhases' : 'answerPhases';
        const elapsed = Math.max(0, Date.now() - startedAt);
        const entry = { phase, elapsed_ms: elapsed, ...extras };
        apiDiagState[key] = [...apiDiagState[key].slice(-19), entry];
      }

      function perfNowMs() {
        return Math.round((window.performance?.now?.() || Date.now()) * 10) / 10;
      }

      function safeDuration(end, start) {
        if (typeof end !== 'number' || typeof start !== 'number') return '-';
        return String(Math.max(0, Math.round(end - start)));
      }

      function buildMiniappRequestId() {
        return `rq_${Math.random().toString(36).slice(2, 10)}`;
      }

      function startTelemetry(action, endpoint, requestId = buildMiniappRequestId()) {
        const startedAt = perfNowMs();
        const row = {
          action,
          endpoint,
          request_id: requestId,
          attempt: '',
          status: 'started',
          http_code: '',
          missing_network_marks: false,
          hedged: false,
          winner_attempt: '',
          hedge_delay_ms: '',
          marks: { action_start: startedAt, 'tap/action_start': startedAt },
        };
        telemetryRows.unshift(row);
        telemetryRows.splice(8);
        renderTelemetryDebug();
        return row;
      }

      function hasTelemetryMark(row, phase) {
        return Object.prototype.hasOwnProperty.call(row?.marks || {}, phase);
      }

      function isOk200Telemetry(row) {
        return row?.status === 'ok' && String(row?.http_code || '') === '200';
      }

      function networkMarksMissing(row) {
        return !hasTelemetryMark(row, 'request_start')
          || !hasTelemetryMark(row, 'response_received')
          || !hasTelemetryMark(row, 'json_parsed');
      }

      function finalizeTelemetry(row) {
        if (!row) return;
        row.missing_network_marks = isOk200Telemetry(row) && networkMarksMissing(row);
        if (row.missing_network_marks) row.status = 'ok_missing_network_marks';
      }

      function markTelemetry(row, phase, extras = {}) {
        if (!row) return;
        row.marks[phase] = perfNowMs();
        if (extras.request_id) row.request_id = String(extras.request_id).slice(0, 64);
        if (extras.attempt !== undefined && extras.attempt !== null) row.attempt = String(extras.attempt).slice(0, 8);
        if (extras.status) row.status = String(extras.status).slice(0, 40);
        if (extras.http_code !== undefined && extras.http_code !== null) row.http_code = String(extras.http_code).slice(0, 8);
        if (extras.hedged !== undefined && extras.hedged !== null) row.hedged = extras.hedged === true;
        if (extras.winner_attempt !== undefined && extras.winner_attempt !== null) row.winner_attempt = String(extras.winner_attempt).slice(0, 8);
        if (extras.hedge_delay_ms !== undefined && extras.hedge_delay_ms !== null) row.hedge_delay_ms = String(extras.hedge_delay_ms).slice(0, 8);
        if (phase === 'action_done') finalizeTelemetry(row);
        renderTelemetryDebug();
        if (phase === 'action_done' && debugMode) {
          console.info('miniapp_client_telemetry', buildTelemetrySummary(row));
        }
      }

      function buildTelemetrySummary(row) {
        const marks = row?.marks || {};
        const actionStart = marks.action_start ?? marks['tap/action_start'];
        return {
          action: row.action,
          endpoint: row.endpoint,
          request_id: row.request_id,
          attempt: row.attempt || '-',
          status: row.status || '-',
          http_code: row.http_code || '-',
          missing_network_marks: row.missing_network_marks === true,
          pre_request_ms: safeDuration(marks.request_start, actionStart),
          request_ms: safeDuration(marks.response_received, marks.request_start),
          parse_ms: safeDuration(marks.json_parsed, marks.response_received),
          render_ms: safeDuration(marks.render_done, marks.render_start),
          total_ms: safeDuration(marks.action_done, actionStart),
          hedged: row.hedged === true,
          winner_attempt: row.winner_attempt || '-',
          hedge_delay_ms: row.hedge_delay_ms || '-',
          hedge_started_ms: safeDuration(marks.hedge_retry_started, actionStart),
        };
      }

      function renderTelemetryDebug() {
        if (!debugMode) {
          telemetryDebug.hidden = true;
          return;
        }
        telemetryDebug.hidden = false;
        const lines = ['Client telemetry (last actions): action request_id pre_request_ms request_ms parse_ms render_ms total_ms status/http_code missing_network_marks hedged winner_attempt hedge_delay_ms hedge_started_ms'];
        telemetryRows.slice(0, 6).forEach((row) => {
          const s = buildTelemetrySummary(row);
          lines.push(`${s.action} ${s.request_id || '-'} attempt=${s.attempt} pre=${s.pre_request_ms} req=${s.request_ms} parse=${s.parse_ms} render=${s.render_ms} total=${s.total_ms} status=${s.status}/${s.http_code} missing_network_marks=${s.missing_network_marks ? 'true' : 'false'} hedged=${s.hedged ? 'true' : 'false'} winner_attempt=${s.winner_attempt} hedge_delay_ms=${s.hedge_delay_ms} hedge_started_ms=${s.hedge_started_ms}`);
        });
        telemetryDebug.textContent = lines.join('\n');
      }

      function withMiniappRequestId(headers = {}, requestId = '') {
        const result = { ...headers };
        if (requestId && !result['X-Miniapp-Request-Id']) result['X-Miniapp-Request-Id'] = requestId;
        return result;
      }

      async function fetchJsonWithTelemetry(url, options = {}, timeoutMs = 9000, telemetry = null) {
        const existingRequestId = options.headers?.['X-Miniapp-Request-Id'] || '';
        const requestId = existingRequestId || telemetry?.request_id || buildMiniappRequestId();
        markTelemetry(telemetry, 'before_build_payload', { request_id: requestId, attempt: 1, status: 'preparing' });
        const headers = withMiniappRequestId(options.headers || {}, requestId);
        markTelemetry(telemetry, 'before_fetch', { request_id: requestId, attempt: 1, status: 'before_fetch' });
        markTelemetry(telemetry, 'request_start', { request_id: requestId, attempt: 1, status: 'requesting' });
        const resp = await apiFetch(url, { ...options, headers }, timeoutMs);
        markTelemetry(telemetry, 'response_received', { request_id: requestId, attempt: 1, http_code: resp.status, status: resp.ok ? 'response_ok' : 'response_error' });
        const data = await resp.json();
        markTelemetry(telemetry, 'json_parsed', { request_id: requestId, attempt: 1, http_code: resp.status, status: resp.ok ? 'json_ok' : 'json_error' });
        return { resp, data, requestId };
      }

      function showLoadError() {
        err.textContent =
          'Не удалось загрузить темы. Закройте окно и откройте викторину заново через кнопку 🚀 Викторина в окне или команду /ui.';
      }

      if (!ctx || ctx.type !== 'miniapp_setup_context' || ctx.version !== 1) {
        showLoadError();
      } else if (setupMode && !Array.isArray(ctx.categories)) {
        showLoadError();
      } else {
        const list = Array.isArray(ctx.categories) ? ctx.categories : [];
        setupOptionsCache.categories = list;
        setupRenderCategories = () => {
          const activeCategories = Array.isArray(setupOptionsCache.categories) ? setupOptionsCache.categories : [];
          const mode = form.quiz_mode?.value || 'single';
          const inputType = mode === 'selected_mix' ? 'checkbox' : 'radio';
          const selectedIds = selectedCategoryIds();
          const selectedSet = new Set(mode === 'single' ? selectedIds.slice(0, 1) : selectedIds);
          cats.replaceChildren();
          currentCategoryInputType = inputType;
          activeCategories.forEach((c) => {
            const id = Number(c.id);
            if (!Number.isInteger(id)) return;
            const label = document.createElement('label');
            label.className = 'setup-option';
            const input = document.createElement('input');
            input.type = inputType;

      async function firstSuccessfulOrAllFailed(candidateFactories) {
        const candidates = Array.isArray(candidateFactories) ? candidateFactories : [];
        if (candidates.length === 0) throw new Error('no_candidates');
        return new Promise((resolve, reject) => {
          let pending = candidates.length;
          let settled = false;
          let lastError = null;
          candidates.forEach((createCandidate) => {
            Promise.resolve()
              .then(() => createCandidate())
              .then((value) => {
                if (settled) return;
                if (value === null) {
                  pending -= 1;
                  if (pending === 0) {
                    const exhausted = new Error('all_candidates_suppressed');
                    reject(lastError || exhausted);
                  }
                  return;
                }
                settled = true;
                resolve(value);
              })
              .catch((error) => {
                lastError = error;
                pending -= 1;
                if (!settled && pending === 0) reject(lastError || new Error('all_candidates_failed'));
              });

              const nextRequestId = retryOptions.requestIdFactory ? retryOptions.requestIdFactory(nextAttempt) : '';
              if (retryOptions.onHedgeRetryStarted) retryOptions.onHedgeRetryStarted(nextAttempt, nextRequestId);
              if (raceSettled) return null;
              if (retryOptions.onBeforeBuildPayload) retryOptions.onBeforeBuildPayload(nextAttempt, nextRequestId);
              const nextOptions = optionsFactory(nextAttempt, nextRequestId);
              if (retryOptions.onBeforeFetch) retryOptions.onBeforeFetch(nextAttempt, nextRequestId);
              if (retryOptions.onRequestStart) retryOptions.onRequestStart(nextAttempt, nextRequestId);

              const data = await resp.json();
              if (retryOptions.onJsonParsed) retryOptions.onJsonParsed(nextAttempt, nextRequestId, resp);
              if (!resp.ok) {

                nonOk.errorKind = getApiErrorKind(resp, data);

            })();

                async () => attemptPromise,

              attemptPromise.catch(() => {});
              hedgePromise.catch(() => {});

            if (retryOptions.onResponseReceived) retryOptions.onResponseReceived(attempt, requestId, resp);

              const jsonError = new Error('invalid_json');

            if (!resp.ok) {

                  markTelemetry(telemetry, 'request_start', { request_id: requestId, attempt, status: attempt > 1 ? 'retrying' : 'requesting' });
                },
                onResponseReceived: (attempt, requestId, resp) => {
                  markTelemetry(telemetry, 'response_received', { request_id: requestId, attempt, http_code: resp.status, status: resp.ok ? 'response_ok' : 'response_error' });
                },
                onJsonParsed: (attempt, requestId, resp) => {
                  markTelemetry(telemetry, 'json_parsed', { request_id: requestId, attempt, http_code: resp.status, status: resp.ok ? 'json_ok' : 'json_error' });
                },
                onRetryScheduled: (attempt, retries, errorKind, requestId) => {
                  if (!isAttemptCurrent(attempt)) return;
                  apiDiagState.answerRetryCount = attempt;
                  apiDiagState.answerAttempt = attempt;
                  apiDiagState.answerRequestId = requestId;
                  apiDiagState.answerPhase = 'retry_scheduled';
                  apiDiagState.answerFinalPhase = errorKind;
                  apiDiagState.answerElapsedMs = Date.now() - startedAt;
                  pushDiagPhase('answer', 'retry_scheduled', startedAt, { request_id: requestId, error_code: errorKind });
                  renderApiDiagnostics();
                  runnerState.textContent = 'Сеть подвисла, пробую отправить ещё раз...';
                },
                onBeforeRetry: async (attempt, retries, errorKind, requestId) => {
                  if (!isAttemptCurrent(attempt)) {
                    ignoreLateAttempt(attempt, requestId, 'pre_retry_superseded');
                    return { skipRetry: true, result: null };
                  }
                  apiDiagState.answerElapsedMs = Date.now() - startedAt;
                  apiDiagState.answerPhase = 'pre_retry_state_resync_attempted';
                  apiDiagState.answerFinalPhase = errorKind;
                  renderApiDiagnostics();
                  runnerState.textContent = 'Проверяю, был ли ответ принят...';
                  try {
                    const stateResp = await apiFetch(`${apiBase}/miniapp/state`, { headers: withMiniappRequestId({ Authorization: `tma ${initData}` }, buildMiniappRequestId()) });
                    const stateData = await stateResp.json();
                    if (!(stateResp.ok && stateData?.ok && stateData?.runner_state)) {
                      apiDiagState.answerPhase = 'pre_retry_state_resync_failed';
                      renderApiDiagnostics();
                      return { skipRetry: false };
                    }
                    if (didRunnerStateAdvanceForAnswer(sessionId, questionId, stateData.runner_state)) {
                      apiDiagState.answerPhase = 'pre_retry_state_resync_success';
                      apiDiagState.answerFinalPhase = 'pre_retry_state_resync_success';
                      apiDiagState.answerElapsedMs = Date.now() - startedAt;
                      renderApiDiagnostics();
                      const feedback = getResyncedFeedbackForSubmission(stateData, questionId, selectedOptionIndex);
                      const submissionStatus = feedback ? 'resynced_with_feedback' : 'resynced';
                      return { skipRetry: true, result: { resp: stateResp, data: { ok: true, submission_status: submissionStatus, feedback, runner_state: stateData.runner_state }, attempt, retries, requestId } };
                    }
                    apiDiagState.answerPhase = 'pre_retry_state_resync_no_change';
                    renderApiDiagnostics();
                    return { skipRetry: false };
                  } catch {
                    apiDiagState.answerPhase = 'pre_retry_state_resync_failed';
                    renderApiDiagnostics();
                    return { skipRetry: false };
                  }
                },
                onRetryStarted: (attempt, retries) => {
                  currentActiveAttempt = attempt;
                  if (!isAttemptCurrent(attempt)) {
                    ignoreLateAttempt(attempt, `${requestBaseId}_a${attempt}`, 'retry_started_superseded');
                    return;
                  }
                  apiDiagState.answerAttempt = attempt;
                  apiDiagState.answerRetryCount = Math.max(0, attempt - 1);
                  apiDiagState.answerPhase = attempt === 1 ? 'fetch_started' : 'retry_started';
                  apiDiagState.answerElapsedMs = Date.now() - startedAt;
                  apiDiagState.answerRequestId = `${requestBaseId}_a${attempt}`;
                  pushDiagPhase('answer', attempt === 1 ? 'fetch_started' : 'retry_started', startedAt, { request_id: apiDiagState.answerRequestId });
                  if (attempt > 1) {
                    runnerState.textContent = 'Повторная отправка ответа...';
                  }
                  renderApiDiagnostics();
                },
                onHedgeTimerStarted: (attempt, requestId) => {
                  if (!isAttemptCurrent(attempt)) return;
                  apiDiagState.answerPhase = 'answer_hedge_timer_started';
                  apiDiagState.answerRequestId = requestId;
                  apiDiagState.answerAttempt = attempt;
                  apiDiagState.answerHedgeDelayMs = ANSWER_HEDGE_DELAY_MS;
                  apiDiagState.answerElapsedMs = Date.now() - startedAt;
                  pushDiagPhase('answer', 'answer_hedge_timer_started', startedAt, { request_id: requestId, hedge_delay_ms: ANSWER_HEDGE_DELAY_MS });
                  markTelemetry(telemetry, 'hedge_timer_started', { request_id: requestId, attempt, hedge_delay_ms: ANSWER_HEDGE_DELAY_MS });
                  renderApiDiagnostics();
                },
                onHedgeRetryStarted: (attempt, requestId) => {
                  currentActiveAttempt = attempt;
                  if (!isAttemptCurrent(attempt)) return;
                  apiDiagState.answerPhase = 'answer_hedge_retry_started';
                  apiDiagState.answerRequestId = requestId;
                  apiDiagState.answerAttempt = attempt;
                  apiDiagState.answerHedged = true;
                  apiDiagState.answerHedgeDelayMs = ANSWER_HEDGE_DELAY_MS;
                  apiDiagState.answerHedgeStartedMs = Date.now() - startedAt;
                  apiDiagState.answerElapsedMs = Date.now() - startedAt;
                  pushDiagPhase('answer', 'answer_hedge_retry_started', startedAt, { request_id: requestId, hedge_delay_ms: ANSWER_HEDGE_DELAY_MS });
                  markTelemetry(telemetry, 'hedge_retry_started', { request_id: requestId, attempt, hedged: true, hedge_delay_ms: ANSWER_HEDGE_DELAY_MS });
                  renderApiDiagnostics();
                  runnerState.textContent = 'Сеть подвисла, пробую отправить ещё раз...';
                },
                onHedgeBeforeRetry: async (attempt, retries, requestId) => {
                  if (!isAttemptCurrent(attempt)) return { skipRetry: true, result: null };
                  apiDiagState.answerElapsedMs = Date.now() - startedAt;
                  apiDiagState.answerPhase = 'answer_hedge_state_resync_attempted';
                  apiDiagState.answerFinalPhase = 'answer_hedge_state_resync_attempted';
                  renderApiDiagnostics();
                  runnerState.textContent = 'Проверяю, был ли ответ принят...';
                  try {
                    const stateResp = await apiFetch(`${apiBase}/miniapp/state`, { headers: withMiniappRequestId({ Authorization: `tma ${initData}` }, buildMiniappRequestId()) });
                    const stateData = await stateResp.json();
                    if (stateResp.ok && stateData?.ok && stateData?.runner_state
                      && didRunnerStateAdvanceForAnswer(sessionId, questionId, stateData.runner_state)) {
                      apiDiagState.answerPhase = 'answer_hedge_state_resync_success';
                      apiDiagState.answerFinalPhase = 'answer_hedge_state_resync_success';
                      apiDiagState.answerElapsedMs = Date.now() - startedAt;
                      renderApiDiagnostics();
                      const feedback = getResyncedFeedbackForSubmission(stateData, questionId, selectedOptionIndex);
                      const submissionStatus = feedback ? 'resynced_with_feedback' : 'resynced';
                      return { skipRetry: true, result: { resp: stateResp, data: { ok: true, submission_status: submissionStatus, feedback, runner_state: stateData.runner_state }, attempt, retries, requestId } };
                    }
                    apiDiagState.answerPhase = 'answer_hedge_state_resync_no_change';
                    apiDiagState.answerFinalPhase = 'answer_hedge_state_resync_no_change';
                    apiDiagState.answerElapsedMs = Date.now() - startedAt;
                    renderApiDiagnostics();
                    return { skipRetry: false };
                  } catch {
                    apiDiagState.answerPhase = 'answer_hedge_state_resync_no_change';
                    apiDiagState.answerFinalPhase = 'answer_hedge_state_resync_no_change';
                    apiDiagState.answerElapsedMs = Date.now() - startedAt;
                    renderApiDiagnostics();
                    return { skipRetry: false };
                  }
                },
                hedgeDelayMs: ANSWER_HEDGE_DELAY_MS,
              },
            );
            if (!answerResult || !isSubmissionActive()) {
              ignoreLateAttempt(currentActiveAttempt, apiDiagState.answerRequestId || `${requestBaseId}_a${currentActiveAttempt}`, 'late_attempt_result');
              return;
            }
            const answerJson = answerResult.data;
            apiDiagState.answerStatus = String(answerResult.resp?.status || '');
            apiDiagState.answerHedged = answerResult.hedged === true;
            apiDiagState.answerWinnerAttempt = Number.isInteger(answerResult.attempt) ? answerResult.attempt : 0;
            pushDiagPhase('answer', 'response_headers_received', startedAt, { request_id: answerResult.requestId, status: apiDiagState.answerStatus, winner_attempt: apiDiagState.answerWinnerAttempt, hedged: apiDiagState.answerHedged });
            pushDiagPhase('answer', 'response_body_parsed', startedAt, { request_id: answerResult.requestId });
            if (!(answerJson?.ok === true && answerJson?.runner_state)) throw new Error('api_invalid_payload');
            apiDiagState.attemptStatus = 'api_success';
            apiDiagState.answerPhase = 'api_success';
            apiDiagState.answerFinalPhase = 'api_success';
            apiDiagState.answerElapsedMs = Date.now() - startedAt;
            renderApiDiagnostics();
            try {
              markTelemetry(telemetry, 'render_start', { request_id: answerResult.requestId, status: 'rendering' });
              if (hasCompleteFeedback(answerJson.feedback)) {
                pushDiagPhase('answer', 'state_update_started', startedAt, { request_id: answerResult.requestId });
                runnerState.textContent = 'Ответ принят.';
                renderAnswerFeedback(snapshot, selectedOptionIndex, answerJson.feedback, answerJson.runner_state);
              } else if ((answerJson.submission_status === 'duplicate' || answerJson.submission_status === 'stale_question') && answerJson.runner_state) {
                pushDiagPhase('answer', 'state_update_started', startedAt, { request_id: answerResult.requestId });
                runnerState.textContent = 'Ответ уже был принят, состояние обновлено.';
                renderRunnerState(answerJson.runner_state, { preferLaunchCompact: false });
              } else if (answerJson.submission_status === 'resynced_with_feedback' && hasCompleteFeedback(answerJson.feedback) && answerJson.runner_state) {
                pushDiagPhase('answer', 'state_update_started', startedAt, { request_id: answerResult.requestId });
                runnerState.textContent = 'Ответ принят.';
                renderAnswerFeedback(snapshot, selectedOptionIndex, answerJson.feedback, answerJson.runner_state);
              } else if (answerJson.submission_status === 'resynced' && answerJson.runner_state) {
                pushDiagPhase('answer', 'state_update_started', startedAt, { request_id: answerResult.requestId });
                runnerState.textContent = 'Ответ принят, состояние обновлено.';
                renderRunnerState(answerJson.runner_state, { preferLaunchCompact: false });
              } else {
                pushDiagPhase('answer', 'state_update_started', startedAt, { request_id: answerResult.requestId });
                runnerState.textContent = 'Ответ принят.';
                renderRunnerState(answerJson.runner_state, { preferLaunchCompact: false });
              }
              pushDiagPhase('answer', 'state_update_applied', startedAt, { request_id: answerResult.requestId });
              requestAnimationFrame(() => {
                pushDiagPhase('answer', 'ui_render_mark', startedAt, { request_id: answerResult.requestId });
                markTelemetry(telemetry, 'render_done', { request_id: answerResult.requestId, status: 'rendered' });
                markTelemetry(telemetry, 'action_done', {
                  request_id: answerResult.requestId,
                  status: 'ok',
                  http_code: apiDiagState.answerStatus,
                  hedged: answerResult.hedged === true,
                  winner_attempt: answerResult.attempt,
                  hedge_delay_ms: ANSWER_HEDGE_DELAY_MS,
                });
                renderApiDiagnostics();
              });
              answerSubmitInFlight = false;
              return;
            } catch (_) {
              apiDiagState.answerPhase = 'ui_render_failed';
              apiDiagState.answerElapsedMs = Date.now() - startedAt;
              renderApiDiagnostics();
              runnerState.textContent = 'Не удалось обновить интерфейс после ответа. Попробуйте снова.';
              markTelemetry(telemetry, 'action_done', { status: 'ui_render_failed' });
              enableButtons();
              answerSubmitInFlight = false;
              return;
            }
          } catch (e) {
            apiDiagState.answerElapsedMs = Date.now() - startedAt;
            const errorKind = e?.meta?.errorKind || e?.cause?.errorKind || 'fetch_rejected';
            apiDiagState.answerErrorCode = errorKind;
            apiDiagState.attemptStatus = errorKind;
            apiDiagState.answerPhase = 'retry_exhausted';
            apiDiagState.answerFinalPhase = errorKind;
            apiDiagState.answerRetryCount = Number.isInteger(e?.meta?.attempt) ? e.meta.attempt - 1 : apiDiagState.answerRetryCount;
            pushDiagPhase('answer', 'retry_exhausted', startedAt, { request_id: apiDiagState.answerRequestId, error_code: errorKind });
            markTelemetry(telemetry, 'action_done', { request_id: apiDiagState.answerRequestId, status: errorKind });
            renderApiDiagnostics();
            if (apiBase && initData) {
              apiDiagState.answerPhase = 'state_resync_attempted';
              renderApiDiagnostics();
              try {
                const stateResp = await apiFetch(`${apiBase}/miniapp/state`, { headers: withMiniappRequestId({ Authorization: `tma ${initData}` }, buildMiniappRequestId()) });
                const stateData = await stateResp.json();
                if (stateResp.ok && stateData?.ok && stateData?.runner_state) {
                  apiDiagState.answerPhase = 'state_resync_success';
                  renderApiDiagnostics();
                  markTelemetry(telemetry, 'render_start', { status: 'resync_rendering' });
                  renderRunnerState(stateData.runner_state, { preferLaunchCompact: false });
                  markTelemetry(telemetry, 'render_done', { status: 'resynced' });
                  markTelemetry(telemetry, 'action_done', { status: 'resynced', http_code: stateResp.status });
                  answerSubmitInFlight = false;
                  return;
                }
                apiDiagState.answerPhase = 'state_resync_failed';
              } catch {
                apiDiagState.answerPhase = 'state_resync_failed';
              }
              renderApiDiagnostics();
            }
            runnerState.textContent = 'Не удалось отправить ответ через API. Попробуйте снова.';
            enableButtons();
            answerSubmitInFlight = false;
            return;
          }
        }
        runnerState.textContent = 'Не удалось отправить ответ. Повторите попытку или откройте /ui снова.';
        markTelemetry(telemetry, 'action_done', { status: 'fallback_failed' });
        enableButtons();
        answerSubmitInFlight = false;
      }
      function hasCompleteFeedback(feedback) {
        return Number.isInteger(Number(feedback?.selected_option_index))
          && Number.isInteger(Number(feedback?.correct_option_index))
          && typeof feedback?.selected_option_text === 'string' && feedback.selected_option_text
          && typeof feedback?.correct_option_text === 'string' && feedback.correct_option_text
          && typeof feedback?.is_correct === 'boolean';
      }

      function renderAnswerFeedback(snapshot, selectedOptionIndex, feedback, nextState) {
        showRunnerMode();
        questionView.hidden = false;
        const pendingStatus = questionView.querySelector('[data-answer-status="1"]');
        if (pendingStatus) pendingStatus.remove();
        const optionButtons = [...questionView.querySelectorAll('ol button')];
        optionButtons.forEach((btn) => btn.disabled = true);
        const selectedIdx = Number.isInteger(Number(feedback?.selected_option_index))
          ? Number(feedback.selected_option_index)
          : Number(selectedOptionIndex);
        const correctIdx = Number.isInteger(Number(feedback?.correct_option_index))
          ? Number(feedback.correct_option_index)
          : null;
        optionButtons.forEach((btn) => {
          const idx = Number(btn.getAttribute('data-option-index'));
          if (idx === selectedIdx) btn.classList.add('answer-selected');
          if (correctIdx !== null && idx === correctIdx) btn.classList.add('answer-correct');
          if (idx === selectedIdx && correctIdx !== null && selectedIdx !== correctIdx) btn.classList.add('answer-selected-wrong');
        });

        const feedbackWrap = document.createElement('div');
        feedbackWrap.className = 'answer-feedback';
        const status = document.createElement('p');
        status.className = `feedback-line ${feedback?.is_correct ? 'feedback-correct' : 'feedback-wrong'}`;
        status.textContent = feedback?.is_correct ? '✅ Верно' : '❌ Неверно';
        feedbackWrap.appendChild(status);
        const details = document.createElement('p');
        const selectedText = typeof feedback?.selected_option_text === 'string' && feedback.selected_option_text
          ? feedback.selected_option_text
          : (Array.isArray(snapshot?.options) ? (snapshot.options.find((o) => Number(o.option_index) === selectedIdx)?.option_text || '') : '');
        const correctText = typeof feedback?.correct_option_text === 'string' && feedback.correct_option_text
          ? feedback.correct_option_text
          : (Array.isArray(snapshot?.options) && correctIdx !== null ? (snapshot.options.find((o) => Number(o.option_index) === correctIdx)?.option_text || '') : '');
        const selectedLabel = Number.isInteger(selectedIdx) ? `${selectedIdx + 1}` : '?';
        const isCorrect = feedback?.is_correct === true || (correctIdx !== null && selectedIdx === correctIdx);
        if (!isCorrect && correctIdx !== null && correctText) {
          const correctLabel = `${correctIdx + 1}`;
          details.textContent = `Ваш ответ: ${selectedLabel}${selectedText ? ` — ${selectedText}` : ''}.
Правильный ответ: ${correctLabel}${correctText ? ` — ${correctText}` : ''}.`;
        } else {
          details.textContent = `Ваш ответ: ${selectedLabel}${selectedText ? ` — ${selectedText}` : ''}.`;
        }
        feedbackWrap.appendChild(details);
        if (typeof feedback?.explanation === 'string' && feedback.explanation) {
          const ex = document.createElement('p');
          ex.textContent = `Пояснение: ${feedback.explanation}`;
          feedbackWrap.appendChild(ex);
        }
        questionView.appendChild(feedbackWrap);
        const next = document.createElement('button');
        next.type = 'button';
        next.textContent = 'Далее';
        next.className = 'answer-next';
        next.addEventListener('click', () => renderRunnerState(nextState, { preferLaunchCompact: false }));
        questionView.appendChild(next);
      }

      function renderQuestion(snapshot) {
        showRunnerMode();
        questionView.replaceChildren();
        if (!snapshot || snapshot.status !== 'ok' || !Array.isArray(snapshot.options) || typeof snapshot.question_text !== 'string') {
          runnerState.textContent =
            'Идёт викторина: активный вопрос не найден. Выберите параметры ниже или запустите /quiz.';
          return;
        }

        runnerState.textContent = 'Ответы отправляются в этом окне. Выберите вариант, чтобы перейти к следующему вопросу.';
        const card = document.createElement('div');
        card.className = 'question-card';
        const header = document.createElement('h4');
        header.className = 'question-title';
        const order = Number(snapshot.order_index);
        const total = Number(snapshot.total_questions);
        header.textContent = 'Текущий вопрос';
        card.appendChild(header);
        const progress = document.createElement('div');
        progress.className = 'question-progress';
        progress.textContent =
          Number.isInteger(order) && Number.isInteger(total) && total > 0 ? `Вопрос ${order} из ${total}` : 'Прогресс';
        card.appendChild(progress);

        const q = document.createElement('p');
        q.className = 'question-text';
        q.textContent = snapshot.question_text;
        card.appendChild(q);

        const list = document.createElement('ol');
        snapshot.options.forEach((opt) => {
          const li = document.createElement('li');
          const btn = document.createElement('button');
          btn.type = 'button';
          const idx = Number(opt.option_index);
          const txt = typeof opt.option_text === 'string' ? opt.option_text : '';
          btn.textContent = txt;
          btn.setAttribute('data-option-index', String(idx));
          btn.addEventListener('click', () => submitAnswer(Number(snapshot.session_id), Number(snapshot.question_id), idx, snapshot));
          li.appendChild(btn);
          list.appendChild(li);
        });
        card.appendChild(list);
        questionView.appendChild(card);
        const status = document.createElement('p');
        status.className = 'answer-status';
        status.setAttribute('data-answer-status', '1');
        status.textContent = 'Выберите вариант ответа.';
        questionView.appendChild(status);
      }

      function renderRunnerState(state, { preferLaunchCompact = false } = {}) {
        const compact = normalizeCompactRunnerQuestion(ctx?.runner_q);
        if (preferLaunchCompact && compact) {
          showRunnerMode();
          renderQuestion(compact);
          renderProgress({
            server_derived: true,
            current_question_number: compact.order_index,
            total_questions: compact.total_questions,
            answered_count: Number(ctx?.runner_q?.a),
            remaining_count: Number(ctx?.runner_q?.r),
          });
          renderApiDiagnostics();
          return;
        }

        if (!state || typeof state !== 'object') {
          runnerState.textContent =
            'Викторина ещё не начата. Выберите параметры ниже или запустите викторину в чате через /quiz.';
          renderApiDiagnostics();
          return;
        }

        if (state.state === 'completed' && state.server_derived === true) {
          renderResult(state.result || {});
          renderApiDiagnostics();
          return;
        }

        if (state.state === 'in_progress') {
          showRunnerMode();
          renderQuestion(state.current_question);
          renderProgress(state.progress);
          if (state.compact_progress_only === true && !state.current_question) {
            runnerState.textContent =
              'Этот вопрос не удалось открыть в окне. Продолжите в чате через /quiz или откройте викторину заново.';
          }
          renderApiDiagnostics();
          return;
        }

        runnerState.textContent =
          'Викторина ещё не начата. Выберите параметры ниже или запустите викторину в чате через /quiz.';
        renderApiDiagnostics();
      }

      let glossaryTopicsCache = [];
      let glossaryLastSessionId = '';

      async function glossaryFetch(path, payload = null, requestId = '') {
        const initData = tg?.initData || '';
        const options = payload === null
          ? { headers: withMiniappRequestId({ Authorization: `tma ${initData}` }, requestId) }
          : { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=UTF-8' }, body: JSON.stringify({ init_data: initData, payload }) };
        const resp = await apiFetch(`${apiBase}${path}`, options, 9000);
        const text = await resp.text();
        if (!text.trim()) return { resp, data: null, parseFailureType: 'empty_body' };
        try {
          return { resp, data: JSON.parse(text), parseFailureType: '' };
        } catch (_) {
          return { resp, data: null, parseFailureType: 'invalid_json' };
        }
      }

      function hasUsableGlossaryTopics(topics) {
        return Array.isArray(topics)
          && topics.some((topic) => topic && typeof topic.topic_id === 'string' && typeof topic.title === 'string');
      }

      function getGlossaryTopicsFromSetupPayload(payload) {
        const candidates = [
          payload?.setup?.glossary?.topics,
          payload?.glossary?.topics,
          payload?.setup_options?.glossary?.topics,
          payload?.setupOptions?.glossary?.topics,
        ];
        for (const topics of candidates) {
          if (hasUsableGlossaryTopics(topics)) return topics;
        }
        return [];
      }

      function getGlossaryTopicsFromSetupCache() {
        const topics = Array.isArray(glossarySetupCache.topics) ? glossarySetupCache.topics : [];
        return hasUsableGlossaryTopics(topics) ? topics : [];
      }

      async function fetchGlossaryTopicsFromSetupOptions(requestId) {
        const telemetry = startTelemetry('glossary_setup_options', '/miniapp/setup-options', requestId);
        const { resp, data, parseFailureType } = await fetchJsonWithTelemetry(`${apiBase}/miniapp/setup-options`, {
          headers: withMiniappRequestId({ Authorization: `tma ${tg.initData}` }, requestId),
        }, 9000, telemetry);
        const topics = getGlossaryTopicsFromSetupPayload(data);
        markTelemetry(telemetry, 'action_done', {
          request_id: requestId,
          status: resp.ok && data?.ok === true && hasUsableGlossaryTopics(topics) ? 'ok' : (parseFailureType || (resp.ok ? 'unexpected_payload' : 'non_ok_response')),
          http_code: resp.status,
        });
        return { resp, data, topics, parseFailureType };
      }

      function showGlossaryLoading() {
        showGlossaryView();
        glossaryView.replaceChildren();
        const card = document.createElement('div');
        card.className = 'question-card';
        const msg = document.createElement('p');
        msg.textContent = 'Загружаем глоссарий...';
        card.appendChild(msg);
        glossaryView.appendChild(card);
        runnerState.textContent = 'Загружаем глоссарий...';
      }

      function showGlossaryOpenError(details = {}) {
        showGlossaryView();
        glossaryView.replaceChildren();
        const card = document.createElement('div');
        card.className = 'question-card';
        const msg = document.createElement('p');
        msg.className = 'err';
        msg.textContent = 'Не удалось открыть глоссарий. Попробуйте закрыть окно и открыть /ui заново.';
        card.appendChild(msg);
        glossaryView.appendChild(card);
        runnerState.textContent = 'Не удалось открыть глоссарий. Попробуйте закрыть окно и открыть /ui заново.';
        const safeDetails = {
          attempted_sources: Array.isArray(details.attempted_sources) ? details.attempted_sources.map((source) => String(source).slice(0, 32)) : [],
          endpoint: String(details.endpoint || '/miniapp/glossary/topics'),
          http_status: details.http_status === undefined || details.http_status === null ? '' : String(details.http_status).slice(0, 8),
          parse_failure_type: details.parse_failure_type ? String(details.parse_failure_type).slice(0, 40) : '',
          request_id: details.request_id ? String(details.request_id).slice(0, 64) : '',
        };
        if (debugMode) console.info('miniapp_glossary_open_failed', safeDetails);
        const row = startTelemetry('glossary_topics', safeDetails.endpoint, safeDetails.request_id || undefined);
        markTelemetry(row, 'action_done', { request_id: safeDetails.request_id, status: safeDetails.parse_failure_type || 'api_failed', http_code: safeDetails.http_status });
      }

      function showGlossaryView() {
        modeView.hidden = true;
        form.hidden = true;
        setupIntro.hidden = true;
        questionView.hidden = true;
        glossaryView.hidden = false;
      }

      function renderGlossaryTopics(topics) {
        showGlossaryView();
        glossaryView.replaceChildren();
        const card = document.createElement('div');
        card.className = 'question-card';
        const title = document.createElement('h4');
        title.className = 'question-title';
        title.textContent = 'Глоссарий';
        card.appendChild(title);
        (topics || []).forEach((topic) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = topic.title;
          btn.addEventListener('click', () => renderGlossaryCounts(topic));
          card.appendChild(btn);
        });
        const back = document.createElement('button');
        back.type = 'button';
        back.textContent = 'К выбору режима';
        back.addEventListener('click', showModeSelection);
        card.appendChild(back);
        glossaryView.appendChild(card);
        runnerState.textContent = 'Выберите тему глоссария.';
      }

      function renderGlossaryCounts(topic) {
        showGlossaryView();
        glossaryView.replaceChildren();
        const card = document.createElement('div');
        card.className = 'question-card';
        const title = document.createElement('h4');
        title.className = 'question-title';
        title.textContent = topic.title;
        card.appendChild(title);
        [5, 10, 'all'].forEach((count) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = count === 'all' ? 'Все доступные' : String(count);
          btn.addEventListener('click', async () => {
            runnerState.textContent = 'Запуск теста по глоссарию...';
            const { resp, data } = await glossaryFetch('/miniapp/glossary/start', { topic_id: topic.topic_id, question_count: count });
            if (resp.ok && data?.ok) renderGlossaryState(data.glossary_state);
            else runnerState.textContent = 'Не удалось начать тест по глоссарию.';
          });
          card.appendChild(btn);
        });
        const back = document.createElement('button');
        back.type = 'button';
        back.textContent = 'К темам глоссария';
        back.addEventListener('click', () => renderGlossaryTopics(glossaryTopicsCache));
        card.appendChild(back);
        glossaryView.appendChild(card);
        runnerState.textContent = 'Выберите количество вопросов.';
      }

      function renderGlossaryState(state) {
        if (state?.state === 'completed') return renderGlossaryResult(state.result || {});
        const q = state?.current_question;
        if (!q) return;
        glossaryLastSessionId = q.session_id;
        showGlossaryView();
        glossaryView.replaceChildren();
        const card = document.createElement('div');
        card.className = 'question-card';
        const title = document.createElement('h4');
        title.className = 'question-title';
        title.textContent = 'Термин';
        card.appendChild(title);
        const progress = document.createElement('div');
        progress.className = 'question-progress';
        progress.textContent = `Вопрос ${q.order_index} из ${q.total_questions}`;
        card.appendChild(progress);
        const term = document.createElement('p');
        term.className = 'question-text';
        term.textContent = q.term;
        card.appendChild(term);
        const list = document.createElement('ol');
        q.options.forEach((opt) => {
          const li = document.createElement('li');
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = opt.option_text;
          btn.addEventListener('click', async () => {
            const { resp, data } = await glossaryFetch('/miniapp/glossary/answer', { session_id: q.session_id, selected_option_index: Number(opt.option_index) });
            if (resp.ok && data?.ok) renderGlossaryFeedback(q, data.glossary_state.feedback);
          });
          li.appendChild(btn);
          list.appendChild(li);
        });
        card.appendChild(list);
        glossaryView.appendChild(card);
        runnerState.textContent = 'Выберите определение термина.';
      }

      function renderGlossaryFeedback(question, feedback) {
        const wrap = document.createElement('div');
        wrap.className = 'answer-feedback';
        const status = document.createElement('p');
        status.className = `feedback-line ${feedback?.is_correct ? 'feedback-correct' : 'feedback-wrong'}`;
        status.textContent = feedback?.is_correct ? 'Верно' : 'Неверно';
        wrap.appendChild(status);
        const details = document.createElement('p');
        details.textContent = feedback?.is_correct
          ? `Ваш ответ: ${feedback.selected_option_text}.`
          : `Ваш ответ: ${feedback.selected_option_text}.
Правильный ответ: ${feedback.correct_option_text}.`;
        wrap.appendChild(details);
        const ex = document.createElement('p');
        ex.textContent = `Пояснение: ${feedback?.explanation || ''}`;
        wrap.appendChild(ex);
        const next = document.createElement('button');
        next.type = 'button';
        next.textContent = 'Далее';
        next.className = 'answer-next';
        next.addEventListener('click', async () => {
          const { resp, data } = await glossaryFetch('/miniapp/glossary/next', { session_id: question.session_id });
          if (resp.ok && data?.ok) renderGlossaryState(data.glossary_state);
        });
        wrap.appendChild(next);
        glossaryView.appendChild(wrap);
        runnerState.textContent = 'Ответ проверен.';
      }

      function renderGlossaryResult(result) {
        showGlossaryView();
        glossaryView.replaceChildren();
        const card = document.createElement('div');
        card.className = 'result-card';
        const title = document.createElement('h4');
        title.className = 'result-title';
        title.textContent = 'Тест завершён';
        card.appendChild(title);
        const score = document.createElement('p');
        score.textContent = `Результат: ${Number(result.score) || 0} из ${Number(result.total_questions) || 0}`;
        card.appendChild(score);
        const retry = document.createElement('button');
        retry.type = 'button';
        retry.textContent = 'Пройти ещё раз';
        retry.addEventListener('click', async () => {
          const { resp, data } = await glossaryFetch('/miniapp/glossary/restart', { session_id: glossaryLastSessionId });
          if (resp.ok && data?.ok) renderGlossaryState(data.glossary_state);
        });
        card.appendChild(retry);
        const topics = document.createElement('button');
        topics.type = 'button';
        topics.textContent = 'К темам глоссария';
        topics.addEventListener('click', () => renderGlossaryTopics(glossaryTopicsCache));
        card.appendChild(topics);
        const modes = document.createElement('button');
        modes.type = 'button';
        modes.textContent = 'К выбору режима';
        modes.addEventListener('click', showModeSelection);
        card.appendChild(modes);
        glossaryView.appendChild(card);
        runnerState.textContent = 'Тест по глоссарию завершён.';
      }

      modeTopics.addEventListener('click', () => showSetupMode());
      modeGlossary.addEventListener('click', async () => {
        showGlossaryLoading();
        const attemptedSources = ['cache'];
        const cachedTopics = getGlossaryTopicsFromSetupCache();
        if (hasUsableGlossaryTopics(cachedTopics)) {
          glossaryTopicsCache = cachedTopics;
          renderGlossaryTopics(glossaryTopicsCache);
          return;
        }
        if (!apiBase || !tg?.initData) {
          showGlossaryOpenError({ attempted_sources: attemptedSources, endpoint: '/miniapp/setup-options', http_status: 'not_configured', parse_failure_type: 'missing_api_or_init_data' });
          return;
        }

        const requestId = buildMiniappRequestId();
        let lastFailure = { endpoint: '/miniapp/setup-options', parse_failure_type: 'not_attempted', request_id: requestId };
        attemptedSources.push('setup-options');
        try {
          const setupResult = await fetchGlossaryTopicsFromSetupOptions(requestId);
          if (setupResult.resp.ok && setupResult.data?.ok === true && hasUsableGlossaryTopics(setupResult.topics)) {
            glossaryTopicsCache = setupResult.topics;
            glossarySetupCache.topics = setupResult.topics;
            renderGlossaryTopics(glossaryTopicsCache);
            return;
          }
          lastFailure = { endpoint: '/miniapp/setup-options', http_status: setupResult.resp.status, parse_failure_type: setupResult.parseFailureType || (setupResult.resp.ok ? 'unexpected_payload' : 'non_ok_response'), request_id: requestId };
        } catch (_) {
          lastFailure = { endpoint: '/miniapp/setup-options', parse_failure_type: 'request_exception', request_id: requestId };
        }

        attemptedSources.push('glossary-topics');
        try {
          const { resp, data, parseFailureType } = await glossaryFetch('/miniapp/glossary/topics', null, requestId);
          const topics = getGlossaryTopicsFromSetupPayload(data);
          if (resp.ok && data?.ok === true && hasUsableGlossaryTopics(topics)) {
            glossaryTopicsCache = topics;
            glossarySetupCache.topics = topics;
            renderGlossaryTopics(glossaryTopicsCache);
            return;
          }
          lastFailure = { endpoint: '/miniapp/glossary/topics', http_status: resp.status, parse_failure_type: parseFailureType || (resp.ok ? 'unexpected_payload' : 'non_ok_response'), request_id: requestId };
        } catch (_) {
          lastFailure = { endpoint: '/miniapp/glossary/topics', parse_failure_type: 'request_exception', request_id: requestId };
        }
        showGlossaryOpenError({ ...lastFailure, attempted_sources: attemptedSources });
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        validate();
        if (go.disabled || setupSubmitInFlight) return;

        const mode = form.quiz_mode.value;
        const selected = selectedCategoryIds();
        const rawCount = form.question_count.value;
        const payload = {
          type: 'quiz_setup',
          quiz_mode: mode,
          category_ids: mode === 'all' ? [] : selected,
          question_count: rawCount === 'all' ? null : Number(rawCount),
          difficulty: form.difficulty.value,
        };

        if (apiBase && tg?.initData) {
          setupSubmitInFlight = true;
          setSetupStatus('api_attempted');
          go.disabled = true;
          runnerState.textContent = 'Запуск викторины...';
          err.textContent = '';
          let telemetry = null;
          try {
            apiDiagState.setupTransport = 'simple_body';
            const requestBaseId = buildMiniappRequestId();
            telemetry = startTelemetry('setup', '/miniapp/setup', `${requestBaseId}_a1`);
            const setupStartedAt = Date.now();
            apiDiagState.setupRetryCount = 0;
            apiDiagState.setupAttempt = 1;
            apiDiagState.setupFinalPhase = 'fetch_started';
            apiDiagState.setupPhases = [];
            pushDiagPhase('setup', 'request_scheduled', setupStartedAt, { request_id: `${requestBaseId}_a1` });
            const { data, resp } = await apiFetchWithRetry(
              `${apiBase}/miniapp/setup`,
              (attempt, attemptRequestId) => ({
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
                body: JSON.stringify({ init_data: tg.initData, request_id: attemptRequestId, payload }),
              }),
              25000,
              {
                retries: 1,
                requestIdFactory: (attempt) => `${requestBaseId}_a${attempt}`,
                onBeforeBuildPayload: (attempt, requestId) => {
                  markTelemetry(telemetry, 'before_build_payload', { request_id: requestId, attempt, status: 'preparing' });
                },
                onBeforeFetch: (attempt, requestId) => {
                  markTelemetry(telemetry, 'before_fetch', { request_id: requestId, attempt, status: 'before_fetch' });
                },
                onRequestStart: (attempt, requestId) => {
                  markTelemetry(telemetry, 'request_start', { request_id: requestId, attempt, status: attempt > 1 ? 'retrying' : 'requesting' });
                },
                onResponseReceived: (attempt, requestId, resp) => {
                  markTelemetry(telemetry, 'response_received', { request_id: requestId, attempt, http_code: resp.status, status: resp.ok ? 'response_ok' : 'response_error' });
                },
                onJsonParsed: (attempt, requestId, resp) => {
                  markTelemetry(telemetry, 'json_parsed', { request_id: requestId, attempt, http_code: resp.status, status: resp.ok ? 'json_ok' : 'json_error' });
                },
                onRetryScheduled: (attempt, retries, errorKind, requestId) => {
                  apiDiagState.setupRetryCount = attempt;
                  apiDiagState.setupAttempt = attempt;
                  apiDiagState.setupRequestId = requestId;
                  apiDiagState.setupFinalPhase = 'retry_scheduled';
                  pushDiagPhase('setup', 'retry_scheduled', setupStartedAt, { request_id: requestId, error_code: errorKind });
                  renderApiDiagnostics();
                  runnerState.textContent = 'Запуск не удался, повторная попытка...';
                },
                onRetryStarted: (attempt) => {
                  apiDiagState.setupAttempt = attempt;
                  apiDiagState.setupRetryCount = Math.max(0, attempt - 1);
                  apiDiagState.setupRequestId = `${requestBaseId}_a${attempt}`;
                  apiDiagState.setupFinalPhase = attempt === 1 ? 'fetch_started' : 'retry_started';
                  pushDiagPhase('setup', attempt === 1 ? 'fetch_started' : 'retry_started', setupStartedAt, { request_id: apiDiagState.setupRequestId });
                  renderApiDiagnostics();
                },
              },
            );
            apiDiagState.setupStatusCode = String(resp.status || '');
            apiDiagState.setupElapsedMs = Date.now() - setupStartedAt;
            pushDiagPhase('setup', 'response_headers_received', setupStartedAt, { request_id: apiDiagState.setupRequestId, status: apiDiagState.setupStatusCode });
            pushDiagPhase('setup', 'response_body_parsed', setupStartedAt, { request_id: apiDiagState.setupRequestId });
            if (resp.ok && data?.ok && data?.runner_state) {
              setSetupStatus('api_success');
              pushDiagPhase('setup', 'state_update_started', setupStartedAt, { request_id: apiDiagState.setupRequestId });
              markTelemetry(telemetry, 'render_start', { request_id: apiDiagState.setupRequestId, status: 'rendering' });
              form.hidden = true;
              setupWarning.hidden = true;
              err.textContent = '';
              renderRunnerState(data.runner_state, { preferLaunchCompact: false });
              pushDiagPhase('setup', 'state_update_applied', setupStartedAt, { request_id: apiDiagState.setupRequestId });
              requestAnimationFrame(() => {
                pushDiagPhase('setup', 'ui_render_mark', setupStartedAt, { request_id: apiDiagState.setupRequestId });
                markTelemetry(telemetry, 'render_done', { request_id: apiDiagState.setupRequestId, status: 'rendered' });
                markTelemetry(telemetry, 'action_done', { request_id: apiDiagState.setupRequestId, status: 'ok', http_code: apiDiagState.setupStatusCode });
                renderApiDiagnostics();
              });
              setupSubmitInFlight = false;
              return;
            }
            setSetupStatus('api_failed', String(resp.status || 'non_ok'));
            markTelemetry(telemetry, 'action_done', { request_id: apiDiagState.setupRequestId, status: 'api_failed', http_code: resp.status });
            err.textContent = 'Не удалось начать викторину. Попробуйте ещё раз.';
            runnerState.textContent = 'Не удалось начать викторину. Попробуйте ещё раз.';
          } catch (e) {
            const errorKind = e?.meta?.errorKind || e?.cause?.errorKind || 'network_error';
            apiDiagState.setupFinalPhase = 'retry_exhausted';
            markTelemetry(telemetry, 'action_done', { request_id: apiDiagState.setupRequestId, status: errorKind });
            setSetupStatus(errorKind === 'timeout' ? 'api_timeout' : 'api_failed', errorKind);
            err.textContent = 'Не удалось начать викторину. Попробуйте ещё раз.';
            runnerState.textContent = 'Не удалось начать викторину. Попробуйте ещё раз.';
          }
          go.disabled = false;
          setupSubmitInFlight = false;
          return;
        }
        if (!tg?.sendData) {
          setSetupStatus('fallback_unavailable');
          err.textContent = 'Не удалось начать викторину в окне. Попробуйте открыть её заново или используйте /quiz.';
          return;
        }
        setSetupStatus('fallback_unavailable');
        err.textContent = 'Не удалось начать викторину в окне. Попробуйте ещё раз или используйте /quiz.';
      });

      (async () => {
        renderRunnerState(rs, { preferLaunchCompact: true });
        if (apiBase && tg?.initData && (!setupMode || hydrateOnSetup)) {
          runnerState.textContent = 'Обновляю викторину...';
          const telemetry = startTelemetry('state', '/miniapp/state');
          try {
            const { resp, data } = await fetchJsonWithTelemetry(`${apiBase}/miniapp/state`, { headers: { Authorization: `tma ${tg.initData}` } }, 9000, telemetry);
            if (resp.ok && data?.ok) {
              markTelemetry(telemetry, 'render_start', { status: 'rendering' });
              renderRunnerState(data.runner_state, { preferLaunchCompact: false });
              markTelemetry(telemetry, 'render_done', { status: 'rendered' });
              markTelemetry(telemetry, 'action_done', { status: 'ok', http_code: resp.status });
            } else {
              markTelemetry(telemetry, 'action_done', { status: 'api_failed', http_code: resp.status });
              runnerState.textContent = 'Не удалось обновить состояние. Показываю последний доступный экран.';
            }
          } catch (e) {
            markTelemetry(telemetry, 'action_done', { status: e?.name === 'AbortError' ? 'timeout' : 'fetch_failed' });
            runnerState.textContent = e?.name === 'AbortError'
              ? 'Обновление заняло слишком много времени. Показываю последний доступный экран.'
              : 'Проблема с сетью. Показываю последний доступный экран.';
          }
        }
      })();
      validate();
    </script>
  </body>
</html>
