<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Quiz Setup</title><style>body{font-family:sans-serif;padding:12px}fieldset{margin:10px 0}button{width:100%;padding:12px}label{display:block;margin:6px 0}.err{color:#b00020}[hidden]{display:none}.note{padding:10px;border:1px solid #ddd;border-radius:8px;margin:10px 0}.qopt button{opacity:.75}</style><script src="https://telegram.org/js/telegram-web-app.js"></script></head><body><h3>Настройка викторины</h3><div class="note" id="runner_state"></div><div id="err" class="err"></div><div id="question_view" hidden></div><form id="f" hidden><fieldset><legend>Режим</legend><label><input type="radio" name="quiz_mode" value="single" checked> Конкретная тема</label><label><input type="radio" name="quiz_mode" value="selected_mix"> Микс из выбранных тем</label><label><input type="radio" name="quiz_mode" value="all"> Все темы</label></fieldset><fieldset id="cats_fieldset"><legend>Темы</legend><div id="cats"></div></fieldset><fieldset><legend>Количество</legend><label><input type="radio" name="question_count" value="5" checked>5</label><label><input type="radio" name="question_count" value="10">10</label><label><input type="radio" name="question_count" value="15">15</label><label><input type="radio" name="question_count" value="all">Все доступные</label></fieldset><fieldset><legend>Сложность</legend><label><input type="radio" name="difficulty" value="any" checked>Любая</label><label><input type="radio" name="difficulty" value="easy">easy</label><label><input type="radio" name="difficulty" value="medium">medium</label><label><input type="radio" name="difficulty" value="hard">hard</label></fieldset><button type="submit" id="go" disabled>Начать викторину</button></form><script>
const err=document.getElementById('err'),form=document.getElementById('f'),cats=document.getElementById('cats'),go=document.getElementById('go');
const catsFieldset=document.getElementById('cats_fieldset');
const runnerState=document.getElementById('runner_state');
const questionView=document.getElementById('question_view');
const tg=window.Telegram?.WebApp; if(tg){tg.ready();tg.expand();} else {runnerState.textContent='Mini App API недоступен. Откройте /ui из Telegram.';}
function bad(){err.textContent='Не удалось загрузить список тем. Закройте окно и откройте Mini App заново через /ui.'}
function parseContext(raw){if(!raw)return null;try{const b64=raw.replace(/-/g,'+').replace(/_/g,'/');const padding='='.repeat((4-(b64.length%4))%4);const bin=atob(b64+padding);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i+=1){bytes[i]=bin.charCodeAt(i);}const json=new TextDecoder('utf-8').decode(bytes);return JSON.parse(json);}catch{try{return JSON.parse(decodeURIComponent(raw));}catch{return null;}}}
let ctx=parseContext(new URLSearchParams(location.search).get('context'));
if(!ctx||ctx.type!=='miniapp_setup_context'||ctx.version!==1||!Array.isArray(ctx.categories)){bad();} else {form.hidden=false;ctx.categories.forEach(c=>{const id=Number(c.id); if(!Number.isInteger(id)) return; const l=document.createElement('label'); const i=document.createElement('input'); i.type='checkbox'; i.value=String(id); l.appendChild(i); l.appendChild(document.createTextNode(` ${String(c.name ?? '')}`)); cats.appendChild(l);});}
function renderQuestion(snapshot){
  questionView.replaceChildren();
  if(!snapshot||snapshot.status!=='ok'||!Array.isArray(snapshot.options)||typeof snapshot.question_text!=='string'){
    runnerState.textContent='Экспериментальный режим /ui: активный вопрос не найден. Выберите параметры ниже или запустите /quiz.';
    return;
  }
  runnerState.textContent='Экспериментальный режим /ui: текущий вопрос показан из серверного состояния. Выберите вариант ответа. После отправки откройте /ui снова для обновления состояния.';
  questionView.hidden=false;
  const header=document.createElement('h4');
  const order=Number(snapshot.order_index); const total=Number(snapshot.total_questions);
  header.textContent=(Number.isInteger(order)&&Number.isInteger(total)&&total>0)?`Вопрос ${order} из ${total}`:'Текущий вопрос';
  questionView.appendChild(header);
  const q=document.createElement('p'); q.textContent=snapshot.question_text; questionView.appendChild(q);
  const ol=document.createElement('ol');
  snapshot.options.forEach((opt)=>{
    const li=document.createElement('li');
    const btn=document.createElement('button');
    btn.type='button'; btn.disabled=false; btn.className='qopt';
    const idx=Number(opt.option_index);
    const txt=typeof opt.option_text==='string'?opt.option_text:'';
    btn.textContent=`${Number.isInteger(idx)?idx+1:'?'}: ${txt}`;
    btn.addEventListener('click',()=>{
      if(!tg||!snapshot||typeof snapshot.session_id!=='number'||typeof snapshot.question_id!=='number'||!Number.isInteger(idx)||btn.disabled){
        runnerState.textContent='Не удалось отправить ответ. Откройте /ui заново.';
        return;
      }
      const payload={type:'quiz_answer',session_id:snapshot.session_id,question_id:snapshot.question_id,selected_option_index:idx};
      [...questionView.querySelectorAll('button')].forEach((b)=>{b.disabled=true;});
      runnerState.textContent='Отправляем ответ...';
      try{
        tg.sendData(JSON.stringify(payload));
        runnerState.textContent='Ответ отправлен. Откройте /ui снова, чтобы получить следующий вопрос.';
      }catch{
        runnerState.textContent='Не удалось отправить ответ. Откройте /ui заново.';
        [...questionView.querySelectorAll('button')].forEach((b)=>{b.disabled=false;});
      }
    });
    li.appendChild(btn); ol.appendChild(li);
  });
  questionView.appendChild(ol);
}
function renderProgress(progress){
  if(!progress||progress.server_derived!==true) return;
  const cur=Number(progress.current_question_number);
  const total=Number(progress.total_questions);
  const answered=Number(progress.answered_count);
  const remaining=Number(progress.remaining_count);
  const parts=['Серверный прогресс'];
  if(Number.isInteger(cur)&&Number.isInteger(total)&&total>0) parts.push(`вопрос ${cur}/${total}`);
  if(Number.isInteger(answered)) parts.push(`отвечено: ${answered}`);
  if(Number.isInteger(remaining)) parts.push(`осталось: ${remaining}`);
  runnerState.textContent=`Экспериментальный режим /ui: ${parts.join(' · ')}.`;
}
function renderResult(result){
  questionView.replaceChildren(); questionView.hidden=false;
  const h=document.createElement('h4'); h.textContent='Викторина завершена'; questionView.appendChild(h);
  const p=document.createElement('p');
  const score=Number(result?.score); const total=Number(result?.total_questions); const percent=Number(result?.percent);
  p.textContent=`Результат: ${Number.isInteger(score)?score:0} из ${Number.isInteger(total)?total:0}${Number.isInteger(percent)?` (${percent}%)`:''}`;
  questionView.appendChild(p);
  const n=document.createElement('p'); n.textContent='Чтобы начать новую попытку, используйте /ui (setup) или классический /quiz.'; questionView.appendChild(n);
  runnerState.textContent='Экспериментальный режим /ui: итог загружен из серверного состояния.';
}
function renderRunnerState(state){
  if(!state||typeof state!=='object') { renderQuestion(ctx?.current_question_snapshot); return; }
  if(state.state==='completed'&&state.server_derived===true){ renderResult(state.result||{}); return; }
  if(state.state==='in_progress'){
    renderQuestion(state.current_question||ctx?.current_question_snapshot);
    renderProgress(state.progress);
    return;
  }
  runnerState.textContent='Экспериментальный режим /ui: активная сессия не найдена. Выберите параметры ниже или используйте /quiz.';
}
renderRunnerState(ctx?.runner_state);
function selectedCategoryIds(){return [...cats.querySelectorAll('input:checked')].map(x=>Number(x.value)).filter(Number.isInteger)}
function syncCategoryUi(){const mode=form.quiz_mode.value; const allMode=mode==='all'; catsFieldset.hidden=allMode; [...cats.querySelectorAll('input')].forEach((input)=>{input.disabled=allMode;});}
function validate(){syncCategoryUi(); const mode=form.quiz_mode.value;const selected=selectedCategoryIds();let ok=false;if(mode==='single')ok=selected.length===1;else if(mode==='selected_mix')ok=selected.length>=1;else ok=true;go.disabled=!ok}
form.addEventListener('change',validate);validate();
form.addEventListener('submit',(e)=>{e.preventDefault();if(go.disabled)return;const mode=form.quiz_mode.value;const selected=selectedCategoryIds();const qc=form.question_count.value==='all'?null:Number(form.question_count.value);const payload={type:'quiz_setup',quiz_mode:mode,category_ids:mode==='all'?[]:selected,question_count:qc,difficulty:form.difficulty.value}; if(tg){tg.sendData(JSON.stringify(payload));tg.close();}});
</script></body></html>
