<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Quiz Setup</title><style>body{font-family:sans-serif;padding:12px}fieldset{margin:10px 0}button{width:100%;padding:12px}label{display:block;margin:6px 0}.err{color:#b00020}[hidden]{display:none}.note{padding:10px;border:1px solid #ddd;border-radius:8px;margin:10px 0}.qopt button{opacity:.75}</style><script src="https://telegram.org/js/telegram-web-app.js"></script></head><body><h3>/ui — экспериментальный Mini App runner</h3><div class="note" id="runner_state"></div><div id="err" class="err"></div><div id="question_view" hidden></div><form id="f" hidden><fieldset><legend>Режим</legend><label><input type="radio" name="quiz_mode" value="single" checked> Конкретная тема</label><label><input type="radio" name="quiz_mode" value="selected_mix"> Микс из выбранных тем</label><label><input type="radio" name="quiz_mode" value="all"> Все темы</label></fieldset><fieldset id="cats_fieldset"><legend>Темы</legend><div id="cats"></div></fieldset><fieldset><legend>Количество</legend><label><input type="radio" name="question_count" value="5" checked>5</label><label><input type="radio" name="question_count" value="10">10</label><label><input type="radio" name="question_count" value="15">15</label><label><input type="radio" name="question_count" value="all">Все доступные</label></fieldset><fieldset><legend>Сложность</legend><label><input type="radio" name="difficulty" value="any" checked>Любая</label><label><input type="radio" name="difficulty" value="easy">easy</label><label><input type="radio" name="difficulty" value="medium">medium</label><label><input type="radio" name="difficulty" value="hard">hard</label></fieldset><button type="submit" id="go" disabled>Начать викторину</button></form><script>
const err=document.getElementById('err'),form=document.getElementById('f'),cats=document.getElementById('cats'),go=document.getElementById('go'),questionView=document.getElementById('question_view');
const runnerState=document.getElementById('runner_state');
const tg=window.Telegram?.WebApp; if(tg){tg.ready();tg.expand();} else {runnerState.textContent='Mini App API недоступен. Используйте /quiz или откройте /ui из Telegram-клиента.';}
function bad(){err.textContent='Не удалось загрузить список тем. Закройте окно и откройте Mini App заново через /ui.'}
let ctx={}; try {const h=location.hash.startsWith('#')?location.hash.slice(1):location.hash; const p=new URLSearchParams(h || location.search.slice(1)); const b64=p.get('context'); if(b64){const pad='='.repeat((4-b64.length%4)%4); const j=atob((b64+pad).replace(/-/g,'+').replace(/_/g,'/')); ctx=JSON.parse(decodeURIComponent(escape(j)));}} catch(e){}
const rs=ctx?.runner_state||{};
const runnerLike=rs?.state==='in_progress'||rs?.state==='completed';
const requiresCategories=!runnerLike;
if(!ctx||ctx.type!=='miniapp_setup_context'||ctx.version!==1|| (requiresCategories && !Array.isArray(ctx.categories))){bad();} else {
  const list=Array.isArray(ctx.categories)?ctx.categories:[];
  if(list.length>0){form.hidden=false;list.forEach(c=>{const id=Number(c.id); if(!Number.isInteger(id)) return; const l=document.createElement('label'); const i=document.createElement('input'); i.type='checkbox'; i.value=String(id); l.appendChild(i); l.appendChild(document.createTextNode(` ${String(c.name ?? '')}`)); cats.appendChild(l);});}
}
form.addEventListener('change',()=>{go.disabled=false;});
function renderRunnerState(r){if(!r||typeof r!=='object') return; if(r.state==='in_progress'){const cq=r.current_question; if(!cq||!Array.isArray(cq.options)||cq.options.length===0){runnerState.textContent='Экспериментальный режим /ui: активный вопрос не найден. Выберите параметры ниже или запустите /quiz.'; return;} runnerState.textContent='Вы продолжаете активную сессию. Вопрос загружен из серверного состояния. После отправки ответа откройте /ui снова для обновления.'; questionView.hidden=false; questionView.replaceChildren(); const h=document.createElement('h4'); h.textContent=`Вопрос ${Number(cq.order_index||0)} из ${Number(cq.total_questions||0)}`; questionView.appendChild(h); const p=document.createElement('p'); p.textContent=String(cq.question_text||''); questionView.appendChild(p); const wrap=document.createElement('div'); wrap.className='qopt'; for(const opt of cq.options){const btn=document.createElement('button'); btn.type='button'; btn.textContent=String(opt.option_text||''); btn.addEventListener('click',()=>submitAnswer(Number(cq.session_id), Number(cq.question_id), Number(opt.option_index), btn)); wrap.appendChild(btn);} questionView.appendChild(wrap); return;} if(r.state==='completed'){const result=r.result||{}; questionView.hidden=false; questionView.replaceChildren(); const h=document.createElement('h4'); h.textContent='Сессия завершена'; questionView.appendChild(h); const p=document.createElement('p'); p.textContent=`Результат: ${String(result.summary||'')}`; questionView.appendChild(p); const n=document.createElement('p'); n.textContent='Чтобы начать новую попытку, откройте /ui (setup) или используйте классический /quiz. /stats здесь не отображается.'; questionView.appendChild(n); return;} if(r.state==='setup'){runnerState.textContent='Новая сессия ещё не запущена. Выберите параметры ниже (opt-in /ui) или используйте /quiz.'; }}
function submitAnswer(sessionId, questionId, selectedOptionIndex, btn){if(!tg?.sendData){runnerState.textContent='Не удалось отправить ответ. Повторите попытку или откройте /ui снова для синхронизации.';return;} const payload={type:'quiz_answer',session_id:sessionId,question_id:questionId,selected_option_index:selectedOptionIndex}; try{tg.sendData(JSON.stringify(payload)); btn.disabled=true; runnerState.textContent='Ответ отправлен. Откройте /ui снова, чтобы получить актуальный следующий шаг.';}catch(e){runnerState.textContent='Не удалось отправить ответ. Повторите попытку или откройте /ui снова для синхронизации.';}}
renderRunnerState(rs);
</script></body></html>
