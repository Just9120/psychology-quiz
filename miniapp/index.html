<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Quiz Setup</title><style>body{font-family:sans-serif;padding:12px}fieldset{margin:10px 0}button{width:100%;padding:12px}label{display:block;margin:6px 0}.err{color:#b00020}[hidden]{display:none}</style><script src="https://telegram.org/js/telegram-web-app.js"></script></head><body><h3>Настройка викторины</h3><div id="err" class="err"></div><form id="f" hidden><fieldset><legend>Режим</legend><label><input type="radio" name="quiz_mode" value="single" checked> Конкретная тема</label><label><input type="radio" name="quiz_mode" value="selected_mix"> Микс из выбранных тем</label><label><input type="radio" name="quiz_mode" value="all"> Все темы</label></fieldset><fieldset id="cats_fieldset"><legend>Темы</legend><div id="cats"></div></fieldset><fieldset><legend>Количество</legend><label><input type="radio" name="question_count" value="5" checked>5</label><label><input type="radio" name="question_count" value="10">10</label><label><input type="radio" name="question_count" value="15">15</label><label><input type="radio" name="question_count" value="all">Все доступные</label></fieldset><fieldset><legend>Сложность</legend><label><input type="radio" name="difficulty" value="any" checked>Любая</label><label><input type="radio" name="difficulty" value="easy">easy</label><label><input type="radio" name="difficulty" value="medium">medium</label><label><input type="radio" name="difficulty" value="hard">hard</label></fieldset><button type="submit" id="go" disabled>Начать викторину</button></form><script>
const err=document.getElementById('err'),form=document.getElementById('f'),cats=document.getElementById('cats'),go=document.getElementById('go');
const catsFieldset=document.getElementById('cats_fieldset');
const tg=window.Telegram?.WebApp; if(tg){tg.ready();tg.expand();}
function bad(){err.textContent='Не удалось загрузить список тем. Закройте окно и откройте Mini App заново через /ui.'}
let ctx; try{const raw=new URLSearchParams(location.search).get('context'); ctx=raw?JSON.parse(decodeURIComponent(raw)):null;}catch{ctx=null}
if(!ctx||ctx.type!=='miniapp_setup_context'||ctx.version!==1||!Array.isArray(ctx.categories)){bad();} else {form.hidden=false;ctx.categories.forEach(c=>{const id=Number(c.id); if(!Number.isInteger(id)) return; const l=document.createElement('label'); const i=document.createElement('input'); i.type='checkbox'; i.value=String(id); l.appendChild(i); l.appendChild(document.createTextNode(` ${String(c.name ?? '')}`)); cats.appendChild(l);});}
function selectedCategoryIds(){return [...cats.querySelectorAll('input:checked')].map(x=>Number(x.value)).filter(Number.isInteger)}
function syncCategoryUi(){const mode=form.quiz_mode.value; const allMode=mode==='all'; catsFieldset.hidden=allMode; [...cats.querySelectorAll('input')].forEach((input)=>{input.disabled=allMode;});}
function validate(){syncCategoryUi(); const mode=form.quiz_mode.value;const selected=selectedCategoryIds();let ok=false;if(mode==='single')ok=selected.length===1;else if(mode==='selected_mix')ok=selected.length>=1;else ok=true;go.disabled=!ok}
form.addEventListener('change',validate);validate();
form.addEventListener('submit',(e)=>{e.preventDefault();if(go.disabled)return;const mode=form.quiz_mode.value;const selected=selectedCategoryIds();const qc=form.question_count.value==='all'?null:Number(form.question_count.value);const payload={type:'quiz_setup',quiz_mode:mode,category_ids:mode==='all'?[]:selected,question_count:qc,difficulty:form.difficulty.value}; if(tg){tg.sendData(JSON.stringify(payload));tg.close();}});
</script></body></html>
