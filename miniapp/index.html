<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz Setup</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 12px;
      }

      fieldset {
        margin: 10px 0;
      }

      button {
        width: 100%;
        padding: 12px;
      }

      label {
        display: block;
        margin: 6px 0;
      }

      [hidden] {
        display: none;
      }

      .err {
        color: #b00020;
      }

      .meta {
        color: #555;
        font-size: 0.95em;
        margin: -6px 0 10px 0;
      }

      .note {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin: 10px 0;
      }

      .warn {
        padding: 10px;
        border: 1px solid #b00020;
        border-radius: 8px;
        background: #fff5f5;
        color: #7a0012;
        margin: 10px 0;
      }
      .feedback-correct { color: #0a7d24; font-weight: 700; }
      .feedback-wrong { color: #b00020; font-weight: 700; }
      .answer-selected { outline: 2px solid #666; }
      .answer-correct { outline: 2px solid #0a7d24; }
      .answer-selected-wrong { outline: 2px solid #b00020; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <h3>/ui — экспериментальный Mini App runner</h3>
    <div id="frontend_marker" class="meta" hidden></div>
    <div id="runner_state" class="note"></div>
    <div id="api_diag" class="note" hidden></div>
    <div id="err" class="err"></div>
    <div id="question_view" hidden></div>
    <div id="setup_warning" class="warn" hidden></div>

    <form id="f" hidden>
      <fieldset>
        <legend>Режим</legend>
        <label><input type="radio" name="quiz_mode" value="single" checked /> Конкретная тема</label>
        <label><input type="radio" name="quiz_mode" value="selected_mix" /> Микс из выбранных тем</label>
        <label><input type="radio" name="quiz_mode" value="all" /> Все темы</label>
      </fieldset>

      <fieldset id="cats_fieldset">
        <legend>Темы</legend>
        <div id="cats"></div>
      </fieldset>

      <fieldset>
        <legend>Количество</legend>
        <label><input type="radio" name="question_count" value="5" checked /> 5</label>
        <label><input type="radio" name="question_count" value="10" /> 10</label>
        <label><input type="radio" name="question_count" value="15" /> 15</label>
        <label><input type="radio" name="question_count" value="all" /> Все доступные</label>
      </fieldset>

      <fieldset>
        <legend>Сложность</legend>
        <label><input type="radio" name="difficulty" value="any" checked /> Любая</label>
        <label><input type="radio" name="difficulty" value="easy" /> easy</label>
        <label><input type="radio" name="difficulty" value="medium" /> medium</label>
        <label><input type="radio" name="difficulty" value="hard" /> hard</label>
      </fieldset>

      <button type="submit" id="go" disabled>Начать викторину</button>
    </form>

    <script>
      const FRONTEND_VERSION = 'ui-polish-v3';
      const ANSWER_API_TIMEOUT_MS = 4000;

      const err = document.getElementById('err');
      const form = document.getElementById('f');
      const cats = document.getElementById('cats');
      const go = document.getElementById('go');
      const questionView = document.getElementById('question_view');
      const catsFieldset = document.getElementById('cats_fieldset');
      const setupWarning = document.getElementById('setup_warning');
      const runnerState = document.getElementById('runner_state');
      const apiDiag = document.getElementById('api_diag');
      const frontendMarker = document.getElementById('frontend_marker');
      const tg = window.Telegram?.WebApp;

      if (tg) {
        tg.ready();
        tg.expand();
      } else {
        runnerState.textContent =
          'Mini App API недоступен. Используйте /quiz или откройте /ui из Telegram-клиента.';
      }

      function parseContext(raw) {
        if (!raw) return null;
        try {
          const b64 = raw.replace(/-/g, '+').replace(/_/g, '/');
          const padding = '='.repeat((4 - (b64.length % 4)) % 4);
          const bin = atob(b64 + padding);
          const bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i += 1) {
            bytes[i] = bin.charCodeAt(i);
          }
          const json = new TextDecoder('utf-8').decode(bytes);
          return JSON.parse(json);
        } catch {
          try {
            return JSON.parse(decodeURIComponent(raw));
          } catch {
            return null;
          }
        }
      }

      function getQueryParam(name) {
        const searchParams = new URLSearchParams(location.search.slice(1));
        return searchParams.get(name);
      }

      function getContextParam() {
        const searchContext = getQueryParam('context');
        if (searchContext) return searchContext;
        const hashParams = new URLSearchParams(location.hash.replace(/^#/, ''));
        return hashParams.get('context');
      }

      const ctx = parseContext(getContextParam()) || {};
      const rs = ctx?.runner_state || {};
      const hasCompactRunnerQuestion = ctx?.runner_q?.m === 'runner' && ctx?.runner_q?.sd === true;
      const runnerMode = rs?.state === 'in_progress' || hasCompactRunnerQuestion;
      const completedMode = rs?.state === 'completed';
      const setupMode = !runnerMode && !completedMode;
      const hydrateOnSetup = ctx?.hydrate_on_setup === true;

      function isDebugMode() {
        if (getQueryParam('debug') === '1') return true;
        return ctx?.debug === true;
      }

      const debugMode = isDebugMode();
      frontendMarker.textContent = `Mini App frontend: ${FRONTEND_VERSION}`;
      frontendMarker.hidden = !debugMode;

      const apiDiagState = {
        configured: false,
        initDataPresent: false,
        attemptStatus: 'not_attempted',
        setupStatus: 'not_attempted',
        setupErrorCode: '',
        apiOrigin: '',
        answerRequestId: '',
        answerPhase: 'idle',
        answerElapsedMs: 0,
        answerRetryCount: 0,
        answerAttempt: 0,
        answerFinalPhase: 'idle',
        setupRetryCount: 0,
        setupAttempt: 0,
        setupRequestId: '',
        setupFinalPhase: 'idle',
        answerEndpointPath: '/miniapp/answer',
      };
      const setupOptionsCache = {
        categories: Array.isArray(ctx?.categories) ? ctx.categories : [],
      };
      let setupRenderCategories = null;
      let answerSubmitInFlight = false;
      let setupSubmitInFlight = false;

      function clearRunnerView() {
        questionView.replaceChildren();
        questionView.hidden = true;
      }

      function showSetupMode({ message = 'Выберите параметры и нажмите «Начать викторину».', clearError = true } = {}) {
        clearRunnerView();
        form.hidden = false;
        setupWarning.hidden = true;
        if (clearError) err.textContent = '';
        if (typeof setupRenderCategories === 'function') {
          setupRenderCategories();
        }
        validate();
        runnerState.textContent = message;
      }

      function showRunnerMode() {
        form.hidden = true;
        setupWarning.hidden = true;
        questionView.hidden = false;
      }

      function showCompletedMode() {
        form.hidden = true;
        setupWarning.hidden = true;
        questionView.hidden = false;
      }

      function detectContextMode() {
        if (!ctx || ctx.type !== 'miniapp_setup_context' || ctx.version !== 1) return 'invalid';
        if (completedMode) return 'completed';
        if (runnerMode) return 'runner';
        return 'setup';
      }

      function renderApiDiagnostics() {
        if (!debugMode) {
          apiDiag.hidden = true;
          return;
        }
        const mode = detectContextMode();
        const origin = apiDiagState.apiOrigin ? ` · origin: ${apiDiagState.apiOrigin}` : '';
        apiDiag.hidden = false;
        apiDiag.textContent =
          `API diag — frontend: ${FRONTEND_VERSION} · mode: ${mode} · configured: ` +
          `${apiDiagState.configured ? 'yes' : 'no'} · initData: ${apiDiagState.initDataPresent ? 'yes' : 'no'} ` +
          `· answer: ${apiDiagState.attemptStatus} · setup: ${apiDiagState.setupStatus}` +
          ` · req_id: ${apiDiagState.answerRequestId || '-'} · phase: ${apiDiagState.answerPhase}` +
          ` · elapsed_ms: ${apiDiagState.answerElapsedMs} · retry: ${apiDiagState.answerRetryCount}` +
          ` · attempt: ${apiDiagState.answerAttempt} · final: ${apiDiagState.answerFinalPhase}` +
          ` · setup_req_id: ${apiDiagState.setupRequestId || '-'} · setup_retry: ${apiDiagState.setupRetryCount}` +
          ` · setup_attempt: ${apiDiagState.setupAttempt} · setup_final: ${apiDiagState.setupFinalPhase}` +
          ` · endpoint: ${apiDiagState.answerEndpointPath}` +
          `${apiDiagState.setupErrorCode ? ` · setup_code: ${apiDiagState.setupErrorCode}` : ''}${origin}`;
      }

      function buildMiniappRequestId() {
        return `rq_${Math.random().toString(36).slice(2, 10)}`;
      }

      function showLoadError() {
        err.textContent =
          'Не удалось загрузить список тем. Закройте окно и откройте Mini App заново через /ui.';
      }

      if (!ctx || ctx.type !== 'miniapp_setup_context' || ctx.version !== 1) {
        showLoadError();
      } else if (setupMode && !Array.isArray(ctx.categories)) {
        showLoadError();
      } else {
        const list = Array.isArray(ctx.categories) ? ctx.categories : [];
        setupOptionsCache.categories = list;
        setupRenderCategories = () => {
          const activeCategories = Array.isArray(setupOptionsCache.categories) ? setupOptionsCache.categories : [];
          cats.replaceChildren();
          activeCategories.forEach((c) => {
            const id = Number(c.id);
            if (!Number.isInteger(id)) return;
            const label = document.createElement('label');
            const input = document.createElement('input');
            input.type = 'checkbox';
            input.value = String(id);
            label.appendChild(input);
            label.appendChild(document.createTextNode(` ${String(c.name ?? '')}`));
            cats.appendChild(label);
          });
        };
        if (setupMode) {
          form.hidden = false;
          if (ctx?.abandons_active_session === true) {
            setupWarning.hidden = false;
            setupWarning.textContent = 'Запуск новой викторины завершит текущую активную попытку.';
            go.textContent = 'Начать новую викторину';
          }
          setupRenderCategories();
        }
        window.__miniappRenderSetupInPlace = () => {
          const activeCategories = Array.isArray(setupOptionsCache.categories) ? setupOptionsCache.categories : [];
          if (activeCategories.length === 0) return false;
          showSetupMode();
          return true;
        };
      }

      function selectedCategoryIds() {
        return [...cats.querySelectorAll('input:checked')].map((x) => Number(x.value)).filter(Number.isInteger);
      }

      function syncCategoryUi() {
        const mode = form.quiz_mode.value;
        const allMode = mode === 'all';
        catsFieldset.hidden = allMode;
        [...cats.querySelectorAll('input')].forEach((input) => {
          input.disabled = allMode;
        });
      }

      function validate() {
        if (form.hidden) {
          go.disabled = true;
          return;
        }
        syncCategoryUi();
        const mode = form.quiz_mode.value;
        const selected = selectedCategoryIds();
        let ok = false;
        if (mode === 'single') ok = selected.length === 1;
        else if (mode === 'selected_mix') ok = selected.length >= 1;
        else ok = true;
        go.disabled = !ok;
      }

      form.addEventListener('change', validate);

      function normalizeCompactRunnerQuestion(compact) {
        if (!compact || compact.m !== 'runner' || compact.sd !== true) return null;
        const options = Array.isArray(compact.o) ? compact.o : [];
        const normalizedOptions = [];
        options.forEach((pair) => {
          if (!Array.isArray(pair) || pair.length !== 2) return;
          const idx = Number(pair[0]);
          const txt = typeof pair[1] === 'string' ? pair[1] : '';
          if (Number.isInteger(idx)) normalizedOptions.push({ option_index: idx, option_text: txt });
        });
        return {
          status: 'ok',
          session_id: Number(compact.s),
          question_id: Number(compact.q),
          order_index: Number(compact.n),
          total_questions: Number(compact.t),
          question_text: typeof compact.qt === 'string' ? compact.qt : '',
          options: normalizedOptions,
        };
      }

      function renderProgress(progress) {
        if (!progress || progress.server_derived !== true) return;
        const cur = Number(progress.current_question_number);
        const total = Number(progress.total_questions);
        const answered = Number(progress.answered_count);
        const remaining = Number(progress.remaining_count);
        const parts = [];
        if (Number.isInteger(cur) && Number.isInteger(total) && total > 0) parts.push(`вопрос ${cur}/${total}`);
        if (Number.isInteger(answered)) parts.push(`отвечено: ${answered}`);
        if (Number.isInteger(remaining)) parts.push(`осталось: ${remaining}`);
        if (parts.length > 0) {
          runnerState.textContent = `Экспериментальный режим /ui: ${parts.join(' · ')}.`;
        }
      }

      function getSafeSetupUrl() {
        if (!(ctx?.setup_url && typeof ctx.setup_url === 'string')) return null;
        try {
          const setupUrl = new URL(ctx.setup_url, location.origin);
          if (setupUrl.origin !== location.origin) return null;
          if (!(setupUrl.pathname === '/' || setupUrl.pathname === '/ui' || setupUrl.pathname === '/miniapp' || setupUrl.pathname === '/miniapp/')) return null;
          return setupUrl.toString();
        } catch (_) {
          return null;
        }
      }

      function buildCompletionActions() {
        const actions = document.createElement('div');

        const restart = document.createElement('button');
        restart.type = 'button';
        restart.textContent = 'Новая викторина';
        restart.addEventListener('click', async () => {
          if (typeof window.__miniappRenderSetupInPlace === 'function' && window.__miniappRenderSetupInPlace()) {
            setSetupStatus('ready_for_submit');
            return;
          }
          if (Array.isArray(setupOptionsCache.categories) && setupOptionsCache.categories.length > 0) {
            ctx.categories = setupOptionsCache.categories;
            if (typeof window.__miniappRenderSetupInPlace === 'function' && window.__miniappRenderSetupInPlace()) {
              setSetupStatus('ready_for_submit');
              return;
            }
          }
          if (apiBase && tg?.initData) {
            runnerState.textContent = 'Загрузка параметров новой викторины...';
            try {
              const resp = await apiFetch(`${apiBase}/miniapp/setup-options`, {
                headers: { Authorization: `tma ${tg.initData}` },
              });
              const data = await resp.json();
              const categories = Array.isArray(data?.setup_options?.categories) ? data.setup_options.categories : [];
              if (resp.ok && data?.ok === true && categories.length > 0) {
                setupOptionsCache.categories = categories;
                ctx.categories = categories;
                if (typeof window.__miniappRenderSetupInPlace === 'function' && window.__miniappRenderSetupInPlace()) {
                  setSetupStatus('ready_for_submit');
                  return;
                }
              }
            } catch (_) {}
          }
          const safeSetupUrl = getSafeSetupUrl();
          if (safeSetupUrl) {
            location.href = safeSetupUrl;
            return;
          }
          runnerState.textContent =
            'Чтобы начать новую викторину, закройте Mini App и отправьте /ui заново.';
        });
        actions.appendChild(restart);

        if (tg?.close) {
          const closeBtn = document.createElement('button');
          closeBtn.type = 'button';
          closeBtn.textContent = 'Закрыть Mini App';
          closeBtn.style.marginTop = '8px';
          closeBtn.addEventListener('click', () => tg.close());
          actions.appendChild(closeBtn);
        }
        return actions;
      }

      function renderResult(result) {
        showCompletedMode();
        questionView.replaceChildren();

        const title = document.createElement('h4');
        title.textContent = 'Викторина завершена';
        questionView.appendChild(title);

        const score = Number(result?.score);
        const total = Number(result?.total_questions);
        const percent = Number(result?.percent);

        const summary = document.createElement('p');
        summary.textContent =
          `Результат: ${Number.isInteger(score) ? score : 0} из ${Number.isInteger(total) ? total : 0}` +
          `${Number.isInteger(percent) ? ` (${percent}%)` : ''}`;
        questionView.appendChild(summary);

        const hint = document.createElement('p');
        hint.textContent =
          'Вы можете начать новую викторину здесь или вернуться к классическому режиму через /quiz.';
        questionView.appendChild(hint);

        questionView.appendChild(buildCompletionActions());
        runnerState.textContent = 'Вы просматриваете завершённый результат из серверного состояния.';
      }

      const apiBase =
        ctx?.api_base_url && typeof ctx.api_base_url === 'string' && ctx.api_base_url.trim()
          ? ctx.api_base_url.trim()
          : '';

      apiDiagState.configured = Boolean(apiBase);
      try {
        apiDiagState.apiOrigin = apiBase ? new URL(apiBase).origin : '';
      } catch {
        apiDiagState.apiOrigin = '';
      }
      apiDiagState.initDataPresent = Boolean(tg?.initData);
      renderApiDiagnostics();

      function setFallbackStatus(text, status) {
        apiDiagState.attemptStatus = status;
        renderApiDiagnostics();
        runnerState.textContent = text;
      }
      function clearAnswerFallbackActions() {
        const existing = questionView.querySelector('[data-answer-fallback-actions="1"]');
        if (existing) existing.remove();
      }
      function showAnswerFallbackAction(payload) {
        clearAnswerFallbackActions();
        if (!tg?.sendData) return;
        const wrapper = document.createElement('div');
        wrapper.setAttribute('data-answer-fallback-actions', '1');
        wrapper.className = 'warn';
        const warning = document.createElement('p');
        warning.textContent = 'Резервный режим Telegram может закрыть Mini App.';
        wrapper.appendChild(warning);
        const fallbackBtn = document.createElement('button');
        fallbackBtn.type = 'button';
        fallbackBtn.textContent = 'Отправить через резервный режим Telegram';
        fallbackBtn.addEventListener('click', () => {
          try {
            apiDiagState.attemptStatus = 'explicit_fallback_sendData';
            renderApiDiagnostics();
            tg.sendData(JSON.stringify(payload));
            runnerState.textContent =
              'Ответ отправлен через резервный режим Telegram. При необходимости откройте /ui для продолжения.';
          } catch {
            runnerState.textContent = 'Не удалось отправить ответ. Повторите попытку или откройте /ui снова.';
          }
        });
        wrapper.appendChild(fallbackBtn);
        questionView.appendChild(wrapper);
      }
      function setSetupStatus(status, code = '') {
        apiDiagState.setupStatus = status;
        apiDiagState.setupErrorCode = code;
        renderApiDiagnostics();
      }

      async function apiFetch(url, options = {}, timeoutMs = 9000) {
        const c = new AbortController();
        const t = setTimeout(() => c.abort(), timeoutMs);
        try {
          return await fetch(url, { ...options, signal: c.signal });
        } finally {
          clearTimeout(t);
        }
      }
      function waitMs(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }
      function isTransientApiError(errorKind) {
        return errorKind === 'timeout' || errorKind === 'fetch_rejected' || errorKind === 'invalid_json';
      }
      async function apiFetchWithRetry(url, optionsFactory, timeoutMs, retryOptions = {}) {
        const retries = Number.isInteger(retryOptions.retries) ? retryOptions.retries : 1;
        const backoffMs = Array.isArray(retryOptions.backoffMs) ? retryOptions.backoffMs : [500, 1000];
        let lastError = null;
        let lastMeta = null;
        const totalAttempts = retries + 1;
        for (let attempt = 1; attempt <= totalAttempts; attempt += 1) {
          if (retryOptions.onRetryStarted) retryOptions.onRetryStarted(attempt, retries);
          const requestId = retryOptions.requestIdFactory ? retryOptions.requestIdFactory(attempt) : '';
          try {
            const resp = await apiFetch(url, optionsFactory(attempt, requestId), timeoutMs);
            let data = null;
            try {
              data = await resp.json();
            } catch {
              const jsonError = new Error('invalid_json');
              jsonError.errorKind = 'invalid_json';
              jsonError.meta = { attempt, retries, requestId, resp };
              throw jsonError;
            }
            if (!resp.ok) {
              const nonOk = new Error('api_non_ok');
              nonOk.errorKind = 'api_non_ok';
              nonOk.meta = { attempt, retries, requestId, resp, data };
              throw nonOk;
            }
            return { resp, data, attempt, retries, requestId };
          } catch (error) {
            const errorKind = error?.errorKind
              || (error?.name === 'AbortError' ? 'timeout'
                : (error?.message === 'api_non_ok' ? 'api_non_ok' : 'fetch_rejected'));
            const meta = error?.meta || { attempt, retries, requestId };
            lastMeta = { ...meta, errorKind };
            lastError = error;
            if (attempt <= retries && isTransientApiError(errorKind)) {
              if (retryOptions.onRetryScheduled) retryOptions.onRetryScheduled(attempt, retries, errorKind, requestId);
              await waitMs(backoffMs[attempt - 1] || 1000);
              continue;
            }
            break;
          }
        }
        const exhausted = new Error('retry_exhausted');
        exhausted.cause = lastError;
        exhausted.meta = lastMeta || {};
        throw exhausted;
      }

      async function submitAnswer(sessionId, questionId, selectedOptionIndex, snapshot) {
        if (answerSubmitInFlight) return;
        answerSubmitInFlight = true;
        clearAnswerFallbackActions();
        const startedAt = Date.now();
        const requestBaseId = buildMiniappRequestId();
        apiDiagState.answerRequestId = `${requestBaseId}_a1`;
        apiDiagState.answerPhase = 'preparing';
        apiDiagState.answerFinalPhase = 'preparing';
        apiDiagState.answerElapsedMs = 0;
        apiDiagState.answerRetryCount = 0;
        apiDiagState.answerAttempt = 1;
        const payload = {
          type: 'quiz_answer',
          session_id: sessionId,
          question_id: questionId,
          selected_option_index: selectedOptionIndex,
        };

        const disableButtons = () => {
          [...questionView.querySelectorAll('ol button')].forEach((b) => {
            b.disabled = true;
          });
        };
        const enableButtons = () => {
          [...questionView.querySelectorAll('ol button')].forEach((b) => {
            b.disabled = false;
          });
        };
        disableButtons();

        const initData = tg?.initData || '';
        apiDiagState.initDataPresent = Boolean(initData);

        if (!apiBase) {
          setFallbackStatus('Используется резервная отправка ответа через Telegram.', 'skipped_missing_api_base');
        } else if (!initData) {
          setFallbackStatus('Используется резервная отправка ответа через Telegram.', 'skipped_missing_init_data');
        } else {
          apiDiagState.attemptStatus = 'api_attempted';
          apiDiagState.answerPhase = 'fetch_started';
          renderApiDiagnostics();
          runnerState.textContent = 'Отправляю ответ...';
          try {
            apiDiagState.answerTransport = 'simple_body';
            const answerResult = await apiFetchWithRetry(
              `${apiBase}/miniapp/answer`,
              (attempt, attemptRequestId) => ({
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
                body: JSON.stringify({
                  init_data: initData,
                  request_id: attemptRequestId,
                  payload: {
                    session_id: sessionId,
                    question_id: questionId,
                    selected_option_index: selectedOptionIndex,
                  },
                }),
              }),
              ANSWER_API_TIMEOUT_MS,
              {
                retries: 2,
                requestIdFactory: (attempt) => `${requestBaseId}_a${attempt}`,
                onRetryScheduled: (attempt, retries, errorKind, requestId) => {
                  apiDiagState.answerRetryCount = attempt;
                  apiDiagState.answerAttempt = attempt;
                  apiDiagState.answerRequestId = requestId;
                  apiDiagState.answerPhase = 'retry_scheduled';
                  apiDiagState.answerFinalPhase = errorKind;
                  apiDiagState.answerElapsedMs = Date.now() - startedAt;
                  renderApiDiagnostics();
                  runnerState.textContent = 'Сеть подвисла, пробую отправить ещё раз...';
                },
                onRetryStarted: (attempt, retries) => {
                  apiDiagState.answerAttempt = attempt;
                  apiDiagState.answerRetryCount = Math.max(0, attempt - 1);
                  apiDiagState.answerPhase = attempt === 1 ? 'fetch_started' : 'retry_started';
                  apiDiagState.answerElapsedMs = Date.now() - startedAt;
                  apiDiagState.answerRequestId = `${requestBaseId}_a${attempt}`;
                  if (attempt > 1) {
                    runnerState.textContent = 'Повторная отправка ответа...';
                  }
                  renderApiDiagnostics();
                },
              },
            );
            const answerJson = answerResult.data;
            if (!(answerJson?.ok === true && answerJson?.runner_state)) throw new Error('api_invalid_payload');
            apiDiagState.attemptStatus = 'api_success';
            apiDiagState.answerPhase = 'api_success';
            apiDiagState.answerFinalPhase = 'api_success';
            apiDiagState.answerElapsedMs = Date.now() - startedAt;
            renderApiDiagnostics();
            try {
              if (hasCompleteFeedback(answerJson.feedback)) {
                runnerState.textContent = 'Ответ принят.';
                renderAnswerFeedback(snapshot, selectedOptionIndex, answerJson.feedback, answerJson.runner_state);
              } else if ((answerJson.submission_status === 'duplicate' || answerJson.submission_status === 'stale_question') && answerJson.runner_state) {
                runnerState.textContent = 'Ответ уже был принят, состояние обновлено.';
                renderRunnerState(answerJson.runner_state, { preferLaunchCompact: false });
              } else {
                runnerState.textContent = 'Ответ принят.';
                renderRunnerState(answerJson.runner_state, { preferLaunchCompact: false });
              }
              answerSubmitInFlight = false;
              return;
            } catch (_) {
              apiDiagState.answerPhase = 'ui_render_failed';
              apiDiagState.answerElapsedMs = Date.now() - startedAt;
              renderApiDiagnostics();
              runnerState.textContent = 'Не удалось обновить интерфейс после ответа. Попробуйте снова.';
              enableButtons();
              answerSubmitInFlight = false;
              return;
            }
          } catch (e) {
            apiDiagState.answerElapsedMs = Date.now() - startedAt;
            const errorKind = e?.meta?.errorKind || e?.cause?.errorKind || 'fetch_rejected';
            apiDiagState.attemptStatus = errorKind;
            apiDiagState.answerPhase = 'retry_exhausted';
            apiDiagState.answerFinalPhase = errorKind;
            apiDiagState.answerRetryCount = Number.isInteger(e?.meta?.attempt) ? e.meta.attempt - 1 : apiDiagState.answerRetryCount;
            renderApiDiagnostics();
            if (apiBase && initData) {
              apiDiagState.answerPhase = 'state_resync_attempted';
              renderApiDiagnostics();
              try {
                const stateResp = await apiFetch(`${apiBase}/miniapp/state`, { headers: { Authorization: `tma ${initData}` } });
                const stateData = await stateResp.json();
                if (stateResp.ok && stateData?.ok && stateData?.runner_state) {
                  apiDiagState.answerPhase = 'state_resync_success';
                  renderApiDiagnostics();
                  renderRunnerState(stateData.runner_state, { preferLaunchCompact: false });
                  answerSubmitInFlight = false;
                  return;
                }
                apiDiagState.answerPhase = 'state_resync_failed';
              } catch {
                apiDiagState.answerPhase = 'state_resync_failed';
              }
              renderApiDiagnostics();
            }
            runnerState.textContent = 'Не удалось отправить ответ через API. Попробуйте снова.';
            enableButtons();
            answerSubmitInFlight = false;
            return;
          }
        }
        runnerState.textContent = 'Не удалось отправить ответ. Повторите попытку или откройте /ui снова.';
        enableButtons();
        answerSubmitInFlight = false;
      }
      function hasCompleteFeedback(feedback) {
        return Number.isInteger(Number(feedback?.selected_option_index))
          && Number.isInteger(Number(feedback?.correct_option_index))
          && typeof feedback?.selected_option_text === 'string' && feedback.selected_option_text
          && typeof feedback?.correct_option_text === 'string' && feedback.correct_option_text
          && typeof feedback?.is_correct === 'boolean';
      }

      function renderAnswerFeedback(snapshot, selectedOptionIndex, feedback, nextState) {
        showRunnerMode();
        questionView.hidden = false;
        const optionButtons = [...questionView.querySelectorAll('ol button')];
        optionButtons.forEach((btn) => btn.disabled = true);
        const selectedIdx = Number.isInteger(Number(feedback?.selected_option_index))
          ? Number(feedback.selected_option_index)
          : Number(selectedOptionIndex);
        const correctIdx = Number.isInteger(Number(feedback?.correct_option_index))
          ? Number(feedback.correct_option_index)
          : null;
        optionButtons.forEach((btn) => {
          const idx = Number(btn.getAttribute('data-option-index'));
          if (idx === selectedIdx) btn.classList.add('answer-selected');
          if (correctIdx !== null && idx === correctIdx) btn.classList.add('answer-correct');
          if (idx === selectedIdx && correctIdx !== null && selectedIdx !== correctIdx) btn.classList.add('answer-selected-wrong');
        });

        const status = document.createElement('p');
        status.className = feedback?.is_correct ? 'feedback-correct' : 'feedback-wrong';
        status.textContent = feedback?.is_correct ? 'Верно' : 'Неверно';
        questionView.appendChild(status);
        const details = document.createElement('p');
        const selectedText = typeof feedback?.selected_option_text === 'string' && feedback.selected_option_text
          ? feedback.selected_option_text
          : (Array.isArray(snapshot?.options) ? (snapshot.options.find((o) => Number(o.option_index) === selectedIdx)?.option_text || '') : '');
        const correctText = typeof feedback?.correct_option_text === 'string' && feedback.correct_option_text
          ? feedback.correct_option_text
          : (Array.isArray(snapshot?.options) && correctIdx !== null ? (snapshot.options.find((o) => Number(o.option_index) === correctIdx)?.option_text || '') : '');
        const selectedLabel = Number.isInteger(selectedIdx) ? `${selectedIdx + 1}` : '?';
        if (correctIdx !== null) {
          const correctLabel = `${correctIdx + 1}`;
          details.textContent = `Ваш ответ: ${selectedLabel}${selectedText ? ` — ${selectedText}` : ''}. Правильный ответ: ${correctLabel}${correctText ? ` — ${correctText}` : ''}.`;
        } else {
          details.textContent = `Ваш ответ: ${selectedLabel}${selectedText ? ` — ${selectedText}` : ''}.`;
        }
        questionView.appendChild(details);
        if (typeof feedback?.explanation === 'string' && feedback.explanation) {
          const ex = document.createElement('p');
          ex.textContent = `Пояснение: ${feedback.explanation}`;
          questionView.appendChild(ex);
        }
        const next = document.createElement('button');
        next.type = 'button';
        next.textContent = 'Далее';
        next.addEventListener('click', () => renderRunnerState(nextState, { preferLaunchCompact: false }));
        questionView.appendChild(next);
      }

      function renderQuestion(snapshot) {
        showRunnerMode();
        questionView.replaceChildren();
        if (!snapshot || snapshot.status !== 'ok' || !Array.isArray(snapshot.options) || typeof snapshot.question_text !== 'string') {
          runnerState.textContent =
            'Экспериментальный режим /ui: активный вопрос не найден. Выберите параметры ниже или запустите /quiz.';
          return;
        }

        runnerState.textContent = 'Ответы отправляются в этом окне. Выберите вариант, чтобы перейти к следующему вопросу.';
        const header = document.createElement('h4');
        const order = Number(snapshot.order_index);
        const total = Number(snapshot.total_questions);
        header.textContent =
          Number.isInteger(order) && Number.isInteger(total) && total > 0 ? `Вопрос ${order} из ${total}` : 'Текущий вопрос';
        questionView.appendChild(header);

        const q = document.createElement('p');
        q.textContent = snapshot.question_text;
        questionView.appendChild(q);

        const list = document.createElement('ol');
        snapshot.options.forEach((opt) => {
          const li = document.createElement('li');
          const btn = document.createElement('button');
          btn.type = 'button';
          const idx = Number(opt.option_index);
          const txt = typeof opt.option_text === 'string' ? opt.option_text : '';
          btn.textContent = `${Number.isInteger(idx) ? idx + 1 : '?'}: ${txt}`;
          btn.setAttribute('data-option-index', String(idx));
          btn.addEventListener('click', () => submitAnswer(Number(snapshot.session_id), Number(snapshot.question_id), idx, snapshot));
          li.appendChild(btn);
          list.appendChild(li);
        });
        questionView.appendChild(list);
      }

      function renderRunnerState(state, { preferLaunchCompact = false } = {}) {
        const compact = normalizeCompactRunnerQuestion(ctx?.runner_q);
        if (preferLaunchCompact && compact) {
          showRunnerMode();
          renderQuestion(compact);
          renderProgress({
            server_derived: true,
            current_question_number: compact.order_index,
            total_questions: compact.total_questions,
            answered_count: Number(ctx?.runner_q?.a),
            remaining_count: Number(ctx?.runner_q?.r),
          });
          renderApiDiagnostics();
          return;
        }

        if (!state || typeof state !== 'object') {
          runnerState.textContent =
            'Новая сессия ещё не запущена. Выберите параметры ниже (opt-in /ui) или используйте /quiz.';
          renderApiDiagnostics();
          return;
        }

        if (state.state === 'completed' && state.server_derived === true) {
          renderResult(state.result || {});
          renderApiDiagnostics();
          return;
        }

        if (state.state === 'in_progress') {
          showRunnerMode();
          renderQuestion(state.current_question);
          renderProgress(state.progress);
          if (state.compact_progress_only === true && !state.current_question) {
            runnerState.textContent =
              'Текущий вопрос слишком большой для Mini App URL-транспорта. Продолжите вопрос через /quiz или откройте /ui позже.';
          }
          renderApiDiagnostics();
          return;
        }

        runnerState.textContent =
          'Новая сессия ещё не запущена. Выберите параметры ниже (opt-in /ui) или используйте /quiz.';
        renderApiDiagnostics();
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        validate();
        if (go.disabled || setupSubmitInFlight) return;

        const mode = form.quiz_mode.value;
        const selected = selectedCategoryIds();
        const rawCount = form.question_count.value;
        const payload = {
          type: 'quiz_setup',
          quiz_mode: mode,
          category_ids: mode === 'all' ? [] : selected,
          question_count: rawCount === 'all' ? null : Number(rawCount),
          difficulty: form.difficulty.value,
        };

        if (apiBase && tg?.initData) {
          setupSubmitInFlight = true;
          setSetupStatus('api_attempted');
          go.disabled = true;
          runnerState.textContent = 'Запуск викторины...';
          err.textContent = '';
          try {
            apiDiagState.setupTransport = 'simple_body';
            const requestBaseId = buildMiniappRequestId();
            apiDiagState.setupRetryCount = 0;
            apiDiagState.setupAttempt = 1;
            apiDiagState.setupFinalPhase = 'fetch_started';
            const { data, resp } = await apiFetchWithRetry(
              `${apiBase}/miniapp/setup`,
              (attempt, attemptRequestId) => ({
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
                body: JSON.stringify({ init_data: tg.initData, request_id: attemptRequestId, payload }),
              }),
              25000,
              {
                retries: 1,
                requestIdFactory: (attempt) => `${requestBaseId}_a${attempt}`,
                onRetryScheduled: (attempt, retries, errorKind, requestId) => {
                  apiDiagState.setupRetryCount = attempt;
                  apiDiagState.setupAttempt = attempt;
                  apiDiagState.setupRequestId = requestId;
                  apiDiagState.setupFinalPhase = 'retry_scheduled';
                  renderApiDiagnostics();
                  runnerState.textContent = 'Запуск не удался, повторная попытка...';
                },
                onRetryStarted: (attempt) => {
                  apiDiagState.setupAttempt = attempt;
                  apiDiagState.setupRetryCount = Math.max(0, attempt - 1);
                  apiDiagState.setupRequestId = `${requestBaseId}_a${attempt}`;
                  apiDiagState.setupFinalPhase = attempt === 1 ? 'fetch_started' : 'retry_started';
                  renderApiDiagnostics();
                },
              },
            );
            if (resp.ok && data?.ok && data?.runner_state) {
              setSetupStatus('api_success');
              form.hidden = true;
              setupWarning.hidden = true;
              err.textContent = '';
              renderRunnerState(data.runner_state, { preferLaunchCompact: false });
              setupSubmitInFlight = false;
              return;
            }
            setSetupStatus('api_failed', String(resp.status || 'non_ok'));
            err.textContent = 'Не удалось запустить викторину через API. Попробуйте снова.';
            runnerState.textContent = 'Не удалось запустить викторину через API. Попробуйте снова.';
          } catch (e) {
            const errorKind = e?.meta?.errorKind || e?.cause?.errorKind || 'network_error';
            apiDiagState.setupFinalPhase = 'retry_exhausted';
            setSetupStatus(errorKind === 'timeout' ? 'api_timeout' : 'api_failed', errorKind);
            err.textContent = 'Не удалось запустить викторину через API. Попробуйте снова.';
            runnerState.textContent = 'Не удалось запустить викторину через API. Попробуйте снова.';
          }
          go.disabled = false;
          setupSubmitInFlight = false;
          return;
        }
        if (!tg?.sendData) {
          setSetupStatus('fallback_unavailable');
          err.textContent = 'API недоступен и sendData недоступен. Переоткройте /ui.';
          return;
        }
        setSetupStatus('fallback_unavailable');
        err.textContent = 'API недоступен. Повторите попытку или используйте /quiz.';
      });

      (async () => {
        renderRunnerState(rs, { preferLaunchCompact: true });
        if (apiBase && tg?.initData && (!setupMode || hydrateOnSetup)) {
          runnerState.textContent = 'Синхронизация состояния с сервером...';
          try {
            const resp = await apiFetch(`${apiBase}/miniapp/state`, { headers: { Authorization: `tma ${tg.initData}` } });
            const data = await resp.json();
            if (resp.ok && data?.ok) renderRunnerState(data.runner_state, { preferLaunchCompact: false });
            else runnerState.textContent = 'Не удалось синхронизировать состояние. Используется контекст запуска.';
          } catch (e) {
            runnerState.textContent = e?.name === 'AbortError'
              ? 'Таймаут синхронизации. Используется контекст запуска; при необходимости переоткройте /ui.'
              : 'Сетевая ошибка синхронизации. Используется контекст запуска.';
          }
        }
      })();
      validate();
    </script>
  </body>
</html>
