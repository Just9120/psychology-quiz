services:
  psych_quiz_bot:
    build: .
    container_name: psych_quiz_bot
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "app.main"]
    volumes:
      - ./data:/data
      - ./content:/app/content:ro
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      MINIAPP_LEGACY_API_ENABLED: "false"

  psych_quiz_miniapp_api:
    build: .
    container_name: psych_quiz_miniapp_api
    restart: unless-stopped
    env_file:
      - .env
    command: ["uvicorn", "app.miniapp_fastapi_runtime:app", "--host", "0.0.0.0", "--port", "8081"]
    volumes:
      - ./data:/data
      - ./content:/app/content:ro
    ports:
      - "127.0.0.1:8081:8081"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8081/healthz', timeout=3); b=json.load(r); raise SystemExit(0 if r.status==200 and b.get('ok') is True else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
